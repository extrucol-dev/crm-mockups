<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Auth · Login</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }
  .breakpoints-row { display: flex; gap: 60px; align-items: flex-start; margin-bottom: 30px; }
  .bp-col { display: flex; flex-direction: column; }

  .login-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100%; }
  .login-left {
    background: var(--primary); position: relative; overflow: hidden;
    padding: 48px 40px; color: #fff; display: flex; flex-direction: column;
  }
  .login-left::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(243, 150, 16, 0.35) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .login-left::after {
    content: ''; position: absolute; bottom: -200px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
    border-radius: 50%; pointer-events: none;
  }
  .login-left__logo { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; display: flex; gap: 2px; position: relative; }
  .login-left__logo span { color: var(--accent); }
  .login-left__tagline { font-size: 11.5px; color: rgba(255,255,255,0.4); margin-top: 2px; letter-spacing: 0.02em; position: relative; }
  .login-left__hero { margin-top: auto; margin-bottom: 40px; position: relative; }
  .login-left__title { font-size: 32px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.15; margin-bottom: 12px; }
  .login-left__title .accent { color: var(--accent); }
  .login-left__subtitle { font-size: 15px; color: rgba(255,255,255,0.6); max-width: 400px; line-height: 1.55; }
  .login-features { display: flex; flex-direction: column; gap: 16px; position: relative; }
  .login-feature { display: flex; align-items: center; gap: 14px; }
  .login-feature__icon {
    width: 40px; height: 40px; background: rgba(255,255,255,0.10);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    color: var(--accent); flex-shrink: 0;
  }
  .login-feature__text { font-size: 14px; color: rgba(255,255,255,0.75); }

  .login-right {
    background: #fff; padding: 60px 40px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .login-form { width: 100%; max-width: 380px; }
  .login-form__icon {
    width: 44px; height: 44px; background: var(--primary-bg); color: var(--primary);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .login-form__title { font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 6px; }
  .login-form__subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
  .login-form__fields { display: flex; flex-direction: column; gap: 16px; }
  .login-form__forgot { text-align: right; font-size: 12.5px; font-weight: 600; color: var(--primary); cursor: pointer; margin-top: -8px; }
  .login-divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
    color: var(--text-disabled); font-size: 12px;
  }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .login-google {
    width: 100%; padding: 10px; border: 1px solid var(--border-input);
    border-radius: 6px; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; transition: background 180ms;
  }
  .login-google:hover { background: var(--page-bg); }
  .login-footer { text-align: center; margin-top: 28px; font-size: 11.5px; color: var(--text-disabled); }

  .is-compact .login-layout { grid-template-columns: 1fr; }
  .is-compact .login-left { padding: 32px 24px; min-height: 220px; }
  .is-compact .login-left__hero { margin-top: 24px; margin-bottom: 24px; }
  .is-compact .login-left__title { font-size: 26px; }
  .is-compact .login-features { display: none; }
  .is-compact .login-right { padding: 32px 24px; }
  .is-mobile-login .login-left__title { font-size: 22px; line-height: 1.2; }
</style>
</head>
<body>
<div class="mockup-scroll">
  <div class="mockup-scroll__inner">
    <div style="margin-bottom: 20px;">
      <div class="canvas-title">🔐 AUTH — Login</div>
      <div class="canvas-subtitle">Pantalla de entrada · Split layout en desktop, stack en tablet/mobile.</div>
    </div>

    <div class="canvas-section-title">🔑 Login</div>
    <div class="breakpoints-row">
      <div class="bp-col">
        <div class="artboard-label">Desktop · 1440 × 900</div>
        <div class="artboard artboard--desktop" id="d-login"></div>
      </div>
      <div class="bp-col">
        <div class="artboard-label">Tablet · 768 × 1024</div>
        <div class="artboard artboard--tablet" id="t-login"></div>
      </div>
      <div class="bp-col">
        <div class="artboard-label">Mobile · 375 × 812</div>
        <div class="artboard artboard--mobile" id="m-login"></div>
      </div>
    </div>

    <div class="canvas-section-title">🔄 Recuperar contraseña</div>
    <div class="breakpoints-row">
      <div class="bp-col">
        <div class="artboard-label">Desktop · 1440</div>
        <div class="artboard artboard--desktop" id="d-forgot"></div>
      </div>
      <div class="bp-col">
        <div class="artboard-label">Tablet · 768</div>
        <div class="artboard artboard--tablet" id="t-forgot"></div>
      </div>
      <div class="bp-col">
        <div class="artboard-label">Mobile · 375</div>
        <div class="artboard artboard--mobile" id="m-forgot"></div>
      </div>
    </div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script>
function renderLeft() {
  return `
    <div class="login-left">
      <div>
        <div class="login-left__logo">CRM <span>Extrucol</span></div>
        <div class="login-left__tagline">Sistema Comercial</div>
      </div>
      <div class="login-left__hero">
        <div class="login-left__title">Seguimiento Comercial<br><span class="accent">Extrucol</span></div>
        <div class="login-left__subtitle">
          Gestiona tu pipeline, tus leads y actividades en terreno desde una única plataforma pensada para el equipo comercial.
        </div>
      </div>
      <div class="login-features">
        <div class="login-feature">
          <div class="login-feature__icon">${Icons.briefcase}</div>
          <div class="login-feature__text">Control total de oportunidades con Kanban intuitivo</div>
        </div>
        <div class="login-feature">
          <div class="login-feature__icon">${Icons.mapPin}</div>
          <div class="login-feature__text">Actividades georreferenciadas y registro móvil en terreno</div>
        </div>
        <div class="login-feature">
          <div class="login-feature__icon">${Icons.chartBar}</div>
          <div class="login-feature__text">Reportes en tiempo real y forecasting por ejecutivo</div>
        </div>
      </div>
    </div>
  `;
}

function renderRight(variant = 'login') {
  if (variant === 'forgot') {
    return `
      <div class="login-right">
        <div class="login-form">
          <a style="font-size: 12.5px; color: var(--primary); font-weight: 600; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px; cursor: pointer;">
            ${Icons.chevronLeft} Volver al login
          </a>
          <div class="login-form__icon" style="background: var(--accent-bg); color: var(--accent);">${Icons.lock}</div>
          <div class="login-form__title">Recuperar contraseña</div>
          <div class="login-form__subtitle">Te enviaremos un enlace para restablecer tu contraseña al email registrado.</div>

          <div class="login-form__fields">
            <div class="form-field">
              <label class="form-field__label">Email</label>
              <input class="input" type="email" placeholder="usuario@extrucol.com">
            </div>
            <button class="btn btn--primary btn--block btn--lg" style="margin-top: 6px;">
              ${Icons.envelope} Enviar enlace
            </button>
          </div>

          <div class="login-footer">Sistema CRM · Extrucol S.A.S · v1.0</div>
        </div>
      </div>
    `;
  }

  return `
    <div class="login-right">
      <div class="login-form">
        <div class="login-form__icon">${Icons.user}</div>
        <div class="login-form__title">Bienvenido de nuevo</div>
        <div class="login-form__subtitle">Ingresa tus credenciales para acceder al sistema</div>

        <div class="login-form__fields">
          <div class="form-field">
            <label class="form-field__label">Email</label>
            <div class="input-wrapper">
              ${Icons.envelope}
              <input class="input input--with-icon" type="email" placeholder="usuario@extrucol.com">
            </div>
          </div>
          <div class="form-field">
            <label class="form-field__label">Contraseña</label>
            <div class="input-wrapper">
              ${Icons.lock}
              <input class="input input--with-icon" type="password" placeholder="••••••••" value="password123">
            </div>
          </div>
          <a class="login-form__forgot">¿Olvidaste tu contraseña?</a>

          <button class="btn btn--primary btn--block btn--lg" style="margin-top: 6px;">
            Ingresar al sistema ${Icons.arrowRight}
          </button>

          <div class="login-divider">o continúa con</div>

          <button class="login-google">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
          </button>
        </div>

        <div class="login-footer">Sistema CRM · Extrucol S.A.S · v1.0</div>
      </div>
    </div>
  `;
}

document.getElementById('d-login').innerHTML = `<div class="login-layout">${renderLeft()}${renderRight('login')}</div>`;
document.getElementById('t-login').innerHTML = `<div class="is-compact"><div class="login-layout">${renderLeft()}${renderRight('login')}</div></div>`;
document.getElementById('m-login').innerHTML = `<div class="is-compact is-mobile-login"><div class="login-layout">${renderLeft()}${renderRight('login')}</div></div>`;

document.getElementById('d-forgot').innerHTML = `<div class="login-layout">${renderLeft()}${renderRight('forgot')}</div>`;
document.getElementById('t-forgot').innerHTML = `<div class="is-compact"><div class="login-layout">${renderLeft()}${renderRight('forgot')}</div></div>`;
document.getElementById('m-forgot').innerHTML = `<div class="is-compact is-mobile-login"><div class="login-layout">${renderLeft()}${renderRight('forgot')}</div></div>`;
</script>
</body>
</html>
