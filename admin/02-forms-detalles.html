<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Admin · Forms y Detalles</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }
  .breakpoints-row { display: flex; gap: 60px; align-items: flex-start; margin-bottom: 30px; }
  .bp-col { display: flex; flex-direction: column; }

  .role-selector {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .role-option {
    padding: 14px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 180ms;
    background: var(--surface);
  }
  .role-option:hover { border-color: var(--primary); }
  .role-option.is-active { border-color: var(--primary); background: var(--primary-bg); }
  .role-option__title { font-weight: 700; color: var(--text-primary); font-size: 13.5px; margin-bottom: 2px; }
  .role-option__desc { font-size: 11.5px; color: var(--text-muted); }

  .perm-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .perm-row:last-child { border-bottom: none; }

  .diff-block {
    background: var(--page-bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    border-left: 3px solid var(--border);
  }
  .diff-block--old {
    background: #FDECEA;
    border-left-color: var(--error);
    color: #7a2219;
  }
  .diff-block--new {
    background: #E8F5EE;
    border-left-color: var(--success);
    color: #0f5f3a;
  }
</style>
</head>
<body>
<div>
  <div>
    <div class="app-shell" id="d-user"></div>

  </div>
</div>

<script src="../shared/components.js"></script>
<script>
// ═══ FORMULARIO USUARIO ═══
function userFormContent(bp) {
  const isMobile = bp === 'mobile';
  const cols = isMobile ? '1fr' : 'repeat(2, 1fr)';

                JP
              </div>
              <div>
                <div style="font-weight: 600; font-size: 13.5px; color: var(--text-primary); margin-bottom: 4px;">Foto de perfil</div>

            <div style="display: grid; grid-template-columns: ${cols}; gap: 14px;">
              <div class="form-field">
                <label class="form-field__label">Nombre completo <span class="req">*</span></label>
                <input class="input" value="Juan Pérez López">
              </div>
              <div class="form-field">
                <label class="form-field__label">Email corporativo <span class="req">*</span></label>
                <input class="input" type="email" value="juan.perez@extrucol.com">
              </div>
              <div class="form-field">
                <label class="form-field__label">Teléfono</label>
                <input class="input" type="tel" value="+57 310 555 1234">
              </div>
              <div class="form-field">
                <label class="form-field__label">Documento</label>

        <!-- Rol y territorio -->
        <div class="card" style="margin-bottom: 14px;">

              <div class="role-selector" style="${isMobile ? 'grid-template-columns: 1fr;' : ''}">
                <div class="role-option is-active">
                  <div class="role-option__title">👔 Ejecutivo Comercial</div>
                  <div class="role-option__desc">Gestiona leads, oportunidades y visitas</div>
                </div>
                <div class="role-option">
                  <div class="role-option__title">⭐ Coordinador</div>
                  <div class="role-option__desc">Supervisa equipo y configura variables</div>
                </div>
                <div class="role-option">
                  <div class="role-option__title">📊 Director Comercial</div>
                  <div class="role-option__desc">Dashboards, reportes y forecasting</div>
                </div>
                <div class="role-option">
                  <div class="role-option__title">🛠️ Administrador</div>
                  <div class="role-option__desc">Usuarios, catálogos y auditoría</div>
                </div>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: ${cols}; gap: 14px;">
              <div class="form-field">
                <label class="form-field__label">Departamento asignado</label>
                <select class="select">
                  <option>Santander</option>
                  <option>Antioquia</option>
                  <option>Valle del Cauca</option>
                  <option>Cundinamarca</option>
                </select>
              </div>
              <div class="form-field">
                <label class="form-field__label">Supervisor directo</label>
                <select class="select">
                  <option>Carlos Muñoz (Director)</option>
                  <option>Diana Ruiz (Coordinador)</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Credenciales y estado -->
        <div class="card" style="margin-bottom: 14px;">
          <div class="card__header">
            <div class="card__title">Acceso al sistema</div>

              <div class="form-field">

                <input class="input" type="password" value="Temporal2026!">

              { label: 'Editar catálogo de productos', enabled: false },
              { label: 'Descargar reportes del equipo', enabled: true },
            ].map(p => `
              <div class="perm-row">
                <label class="switch"><input type="checkbox" ${p.enabled ? 'checked' : ''}><span class="switch__slider"></span></label>
                <span style="flex: 1; font-size: 13px; color: var(--text-primary);">${p.label}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div style="display: flex; gap: 10px; ${isMobile ? 'flex-direction: column;' : 'justify-content: flex-end;'}">
          <button class="btn btn--secondary ${isMobile ? 'btn--block' : ''}">Cancelar</button>

// ═══ DETALLE DE CATÁLOGO ═══
function catDetailContent(bp) {
  const isMobile = bp === 'mobile';

  const estados = [
    { orden: 1, nombre: 'Prospección', tipo: 'ABIERTO', color: '#3B82F6', descripcion: 'Primer contacto con el cliente potencial', usoEn: 18, activo: true },
    { orden: 2, nombre: 'Calificación', tipo: 'ABIERTO', color: '#F97316', descripcion: 'Evaluación de la viabilidad comercial', usoEn: 14, activo: true },
    { orden: 3, nombre: 'Propuesta', tipo: 'ABIERTO', color: '#A855F7', descripcion: 'Cotización técnica y comercial enviada', usoEn: 21, activo: true },
    { orden: 4, nombre: 'Negociación', tipo: 'ABIERTO', color: '#EAB308', descripcion: 'Ajustes finales de precio y condiciones', usoEn: 12, activo: true },
    { orden: 5, nombre: 'Ganada', tipo: 'GANADO', color: '#22C55E', descripcion: 'Oportunidad cerrada exitosamente', usoEn: 45, activo: true },
    { orden: 6, nombre: 'Perdida', tipo: 'PERDIDO', color: '#EF4444', descripcion: 'Oportunidad no concretada', usoEn: 23, activo: true },
  ];

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
            <a style="color: var(--primary); cursor: pointer;">Catálogos</a> / Estados de Oportunidad
          </div>
          <div class="page-head__title">Estados de Oportunidad</div>
          <div class="page-head__subtitle">
            <code style="background: var(--page-bg); padding: 2px 6px; border-radius: 3px; font-size: 11px;">CRM_ESTADO_OPORTUNIDAD</code>
            · ${estados.length} estados registrados · Controla el flujo Kanban de oportunidades
          </div>
        </div>
        ${!isMobile ? `
          <div class="page-head__actions">
            <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
            <button class="btn btn--primary btn--sm">${Icons.plus} Nuevo estado</button>
          </div>
        ` : ''}
      </div>

      <!-- Alerta -->
      <div class="alert alert--warning" style="margin-bottom: 16px;">
        ${Icons.warning}
        <div>
          <strong>Catálogo crítico.</strong> Modificar o eliminar estados puede afectar oportunidades existentes.
          Los cambios requieren aprobación del director y quedan registrados en auditoría.
        </div>
      </div>

      <!-- Stats -->
      <div style="display: grid; grid-template-columns: repeat(${isMobile ? 2 : 4}, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__label">Total estados</div>
          <div class="stat-card__value">${estados.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Abiertos</div>
          <div class="stat-card__value stat-card__value--accent">${estados.filter(e => e.tipo === 'ABIERTO').length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Ganado</div>
          <div class="stat-card__value stat-card__value--success">1</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Perdido</div>
          <div class="stat-card__value" style="color: var(--error);">1</div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="card" style="padding: 0;">
        <div class="card__header" style="padding: 14px 16px;">
          <div>
            <div class="card__title">Registros del catálogo</div>
          </div>
          ${!isMobile ? `
            <div class="input-wrapper" style="max-width: 260px;">
              ${Icons.search}
              <input class="input input--with-icon input--sm" placeholder="Buscar estado...">
            </div>
          ` : ''}
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th style="width: 60px; text-align: center;">Orden</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Color</th>
                ${!isMobile ? `<th>Descripción</th>` : ''}
                <th style="text-align: center;">Uso</th>
                <th>Estado</th>
                <th style="width: 80px;"></th>
              </tr>
            </thead>
            <tbody>
              ${estados.map(e => `
                <tr>
                  <td style="text-align: center; font-weight: 700;">${e.orden}</td>
                  <td style="font-weight: 600; color: var(--text-primary);">${e.nombre}</td>
                  <td><span class="badge badge--${e.tipo === 'ABIERTO' ? 'info' : e.tipo === 'GANADO' ? 'ganada' : 'perdida'}">${e.tipo}</span></td>
                  <td><div style="display: flex; align-items: center; gap: 6px;"><span style="width: 16px; height: 16px; border-radius: 4px; background: ${e.color};"></span><span style="font-family: monospace; font-size: 11.5px;">${e.color}</span></div></td>
                  ${!isMobile ? `<td style="color: var(--text-muted); font-size: 12.5px;">${e.descripcion}</td>` : ''}
                  <td style="text-align: center; font-weight: 700; color: var(--primary);">${e.usoEn}</td>
                  <td>${e.activo ? '<span class="badge badge--ganada"><span class="dot"></span> Activo</span>' : '<span class="badge badge--perdida"><span class="dot"></span> Inactivo</span>'}</td>
                  <td><div style="display: flex; gap: 4px;"><button class="table__action">${Icons.pencil}</button><button class="table__action" style="color: var(--error);">${Icons.trash}</button></div></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Relaciones del catálogo -->
      <div class="card" style="margin-top: 16px;">
        <div class="card__header">
          <div>
            <div class="card__title">Relaciones del catálogo</div>
            <div class="card__subtitle">Tablas que dependen de este catálogo</div>
          </div>
        </div>
        <div class="card__body">
          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span class="badge badge--info" style="font-family: monospace;">${Icons.database.replace('icon"','icon icon--xs"')} CRM_OPORTUNIDAD</span>
            <span class="badge badge--info" style="font-family: monospace;">${Icons.database.replace('icon"','icon icon--xs"')} CRM_HISTORIAL_ESTADO</span>
            <span class="badge badge--info" style="font-family: monospace;">${Icons.database.replace('icon"','icon icon--xs"')} CRM_MOTIVO_CIERRE (estado_ref)</span>
          </div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 10px; line-height: 1.5;">
            Los cambios en este catálogo afectan a <strong>133 oportunidades activas</strong> y <strong>420 registros de historial</strong>.
          </div>
        </div>
      </div>
    </div>
  `;
}

                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Estado completo -->
          <div class="card">
            <div class="card__header">
              <div>
                <div class="card__title">Estado completo del registro</div>
                <div class="card__subtitle">Snapshot después del cambio</div>
              </div>
              <button class="btn btn--ghost btn--sm">${Icons.download} JSON</button>
            </div>
            <div class="card__body">
              <pre style="background: #1a1a1a; color: #A5D8FF; padding: 16px; border-radius: 8px; font-size: 11.5px; font-family: 'SF Mono', Consolas, monospace; overflow-x: auto; line-height: 1.6; margin: 0;"><span style="color: #82C7FF;">{</span>
  "<span style="color: #FFD580;">id_oportunidad</span>": <span style="color: #C5FF82;">42</span>,
  "<span style="color: #FFD580;">titulo</span>": <span style="color: #FFB5B5;">"Proyecto acueducto rural - Piedecuesta"</span>,
  "<span style="color: #FFD580;">id_estado_oportunidad</span>": <span style="color: #C5FF82;">3</span>,
  "<span style="color: #FFD580;">id_empresa</span>": <span style="color: #C5FF82;">89</span>,
  "<span style="color: #FFD580;">valor_estimado</span>": <span style="color: #C5FF82;">485000000</span>,
  "<span style="color: #FFD580;">probabilidad</span>": <span style="color: #C5FF82;">65</span>,
  "<span style="color: #FFD580;">fecha_cierre_estimada</span>": <span style="color: #FFB5B5;">"2026-04-25"</span>,
  "<span style="color: #FFD580;">id_usuario</span>": <span style="color: #C5FF82;">3</span>,
  "<span style="color: #FFD580;">fecha_creacion</span>": <span style="color: #FFB5B5;">"2026-03-05 14:20:00"</span>,
  "<span style="color: #FFD580;">fecha_actualizacion</span>": <span style="color: #FFB5B5;">"2026-04-19 10:32:15"</span>
<span style="color: #82C7FF;">}</span></pre>
            </div>
          </div>
        </div>

        ${!isMobile ? `
          <div style="display: flex; flex-direction: column; gap: 14px;">
            <!-- Contexto del registro -->
            <div class="card">
              <div class="card__header"><div class="card__title">Ver registro</div></div>
              <div class="card__body">
                <button class="btn btn--secondary btn--block" style="margin-bottom: 8px;">
                  ${Icons.view} Ver oportunidad #42
                </button>
                <button class="btn btn--secondary btn--block" style="margin-bottom: 8px;">
                  ${Icons.clock} Ver historial de estados
                </button>
                <button class="btn btn--secondary btn--block">
                  ${Icons.users} Ver perfil del usuario
                </button>
              </div>
            </div>

            <!-- Eventos relacionados -->
            <div class="card">
              <div class="card__header">
                <div class="card__title">Eventos relacionados</div>
              </div>
              <div style="padding: 0;">
                ${[
                  { id: 4872, desc: 'INSERT actividad asociada', time: '2 min antes', user: 'JP', color: 1 },
                  { id: 4870, desc: 'UPDATE en misma oportunidad', time: '4 días antes', user: 'JP', color: 1 },
                  { id: 4870, desc: 'INSERT oportunidad #42', time: '45 días antes', user: 'JP', color: 1 },
                ].map(e => `
                  <div style="padding: 10px 16px; border-top: 1px solid var(--border); cursor: pointer;">
                    <div style="font-size: 12.5px; font-weight: 600; color: var(--text-primary);">#${e.id} ${e.desc}</div>
                    <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px; font-size: 11px; color: var(--text-muted);">
                      <div class="avatar avatar--xs avatar--color-${e.color}" style="width: 14px; height: 14px; font-size: 8px;">${e.user}</div>
                      <span>${e.time}</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Info del sistema -->
            <div class="card">
              <div class="card__header"><div class="card__title">Información del sistema</div></div>
              <div class="card__body" style="font-size: 12px;">
                <dl class="detail-info-list" style="grid-template-columns: 100px 1fr;">
                  <dt>ID evento</dt><dd style="font-family: monospace;">#4871</dd>
                  <dt>Severidad</dt><dd><span class="badge badge--info">MEDIA</span></dd>
                  <dt>Trigger</dt><dd style="font-family: monospace; font-size: 11px;">AUD_TRG_OPORTUNIDAD</dd>
                  <dt>Retención</dt><dd>5 años</dd>
                </dl>
              </div>
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

document.getElementById('d-user').innerHTML = `${renderSidebar('usuarios','admin')}<div class="main-area">${renderTopbar({breadcrumb:['Usuarios','Nuevo']})}${userFormContent('desktop')}</div>`;
</script>
</body>
