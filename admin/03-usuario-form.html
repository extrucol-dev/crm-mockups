<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Admin · Usuario Form</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }
  .breakpoints-row { display: flex; gap: 60px; align-items: flex-start; }
  .bp-col { display: flex; flex-direction: column; }

  .form-card { max-width: 672px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-sm); }
  .form-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .form-section:last-child { border-bottom: none; }
  .form-section__title { font-size: 13px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .form-section__title .icon { color: var(--primary); }
  .form-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .form-grid-full { grid-column: 1 / -1; }

  .rol-card {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 14px; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    transition: all 180ms;
  }
  .rol-card:hover { border-color: var(--primary); background: var(--page-bg); }
  .rol-card.is-selected { border-color: var(--primary); background: var(--primary-bg); }

  .rol-card__radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border-input);
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .rol-card.is-selected .rol-card__radio {
    border-color: var(--primary);
  }
  .rol-card.is-selected .rol-card__radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary);
  }
  .rol-card__title {
    font-weight: 600; font-size: 13.5px; color: var(--text-primary);
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .rol-card__desc { font-size: 11.5px; color: var(--text-muted); line-height: 1.4; }

  .permisos-grid {
    display: grid; gap: 8px;
    margin-top: 10px;
    padding: 12px; background: var(--page-bg); border-radius: 6px;
  }
  .permiso-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
  }
  .permiso-row__check {
    width: 14px; height: 14px; border-radius: 3px;
    background: var(--success); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
  }
  .permiso-row__check--no { background: var(--border); color: transparent; }
</style>
</head>
<body>
<div class="mockup-scroll">
  <div class="mockup-scroll__inner">

    <div style="margin-bottom: 40px;">
      <div class="canvas-title">🟦 ADMIN — Formulario Nuevo Usuario</div>
      <div class="canvas-subtitle">
        Creación/edición de usuario con asignación de rol y preview de permisos.
        DB: <code style="background:#fff; padding: 2px 6px; border-radius:4px; border: 1px solid #e5e5e5;">CRM_USUARIO + CRM_DEPARTAMENTO</code>
      </div>
    </div>

    <div class="breakpoints-row">
      <div class="bp-col"><div class="artboard-label">Desktop · 1440</div><div class="artboard artboard--desktop"><div class="app-shell" id="d"></div></div></div>
      <div class="bp-col"><div class="artboard-label">Tablet · 768</div><div class="artboard artboard--tablet"><div class="app-shell is-tablet" id="t"></div></div></div>
      <div class="bp-col"><div class="artboard-label">Mobile · 375</div><div class="artboard artboard--mobile"><div class="app-shell is-mobile" id="m"></div></div></div>
    </div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script>
function content(bp) {
  const isMobile = bp === 'mobile';
  const gridCols = isMobile ? '1fr' : 'repeat(2, 1fr)';

  return `
    <div class="content">
      ${!isMobile ? `
        <div class="page-head">
          <div class="page-head__title-group">
            <div class="page-head__title">Nuevo usuario</div>
            <div class="page-head__subtitle">Crea un usuario y asigna su rol en el sistema</div>
          </div>
        </div>
      ` : ''}

      <div class="form-card">
        <div class="form-section">
          <div class="form-section__title">${Icons.user} Información personal</div>
          <div class="form-grid-2" style="grid-template-columns: ${gridCols};">
            <div class="form-field">
              <label class="form-field__label">Nombre completo <span class="req">*</span></label>
              <input class="input" placeholder="Nombre y apellidos" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Email corporativo <span class="req">*</span></label>
              <input class="input" type="email" placeholder="usuario@extrucol.co" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Contraseña inicial <span class="req">*</span></label>
              <input class="input" type="password" placeholder="Mínimo 8 caracteres" />
              <span class="form-field__hint">El usuario deberá cambiarla en el primer login</span>
            </div>
            <div class="form-field">
              <label class="form-field__label">Departamento asignado <span class="req">*</span></label>
              <select class="select">
                <option>-- Seleccionar --</option>
                <option>Santander</option>
                <option>Antioquia</option>
                <option>Cundinamarca</option>
                <option>Valle del Cauca</option>
                <option>Atlántico</option>
                <option>Bogotá D.C.</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section__title">${Icons.shieldCheck} Rol y permisos</div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div class="rol-card">
              <div class="rol-card__radio"></div>
              <div>
                <div class="rol-card__title">
                  <span class="badge badge--info">Ejecutivo</span>
                  Ejecutivo Comercial
                </div>
                <div class="rol-card__desc">Acceso a su propia cartera: leads, oportunidades, clientes y actividades. No ve datos de otros ejecutivos.</div>
              </div>
            </div>

            <div class="rol-card is-selected">
              <div class="rol-card__radio"></div>
              <div style="flex:1;">
                <div class="rol-card__title">
                  <span class="badge badge--calificacion">Coordinador</span>
                  Coordinador de Seguimiento
                </div>
                <div class="rol-card__desc">Monitorea la operación de los ejecutivos, gestiona variables del sistema y configura alertas automáticas.</div>

                <div class="permisos-grid">
                  <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px;">Permisos incluidos:</div>
                  <div class="permiso-row"><div class="permiso-row__check">✓</div>Ver todos los leads y oportunidades</div>
                  <div class="permiso-row"><div class="permiso-row__check">✓</div>Configurar variables del sistema</div>
                  <div class="permiso-row"><div class="permiso-row__check">✓</div>Monitorear actividad de ejecutivos</div>
                  <div class="permiso-row"><div class="permiso-row__check">✓</div>Ver mapa GPS del equipo</div>
                  <div class="permiso-row"><div class="permiso-row__check">✓</div>Enviar notificaciones y alertas</div>
                  <div class="permiso-row"><div class="permiso-row__check permiso-row__check--no">×</div><span style="color: var(--text-muted);">Gestionar usuarios del sistema</span></div>
                  <div class="permiso-row"><div class="permiso-row__check permiso-row__check--no">×</div><span style="color: var(--text-muted);">Editar catálogos maestros</span></div>
                </div>
              </div>
            </div>

            <div class="rol-card">
              <div class="rol-card__radio"></div>
              <div>
                <div class="rol-card__title">
                  <span class="badge badge--negociacion">Director</span>
                  Director Comercial
                </div>
                <div class="rol-card__desc">Acceso estratégico: dashboards ejecutivos, reportes, forecasting y análisis por sector.</div>
              </div>
            </div>

            <div class="rol-card">
              <div class="rol-card__radio"></div>
              <div>
                <div class="rol-card__title">
                  <span class="badge badge--perdida">Admin</span>
                  Administrador del Sistema
                </div>
                <div class="rol-card__desc">Control total: gestión de usuarios, catálogos maestros, auditoría y configuración técnica.</div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section__title">${Icons.settings} Opciones adicionales</div>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--page-bg); border-radius: 6px; cursor: pointer;">
              <label class="switch"><input type="checkbox" checked><span class="switch__slider"></span></label>
              <div style="flex:1;">
                <div style="font-weight: 600; font-size: 13px;">Usuario activo</div>
                <div style="font-size: 11.5px; color: var(--text-muted);">Puede acceder al sistema inmediatamente</div>
              </div>
            </label>
            <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--page-bg); border-radius: 6px; cursor: pointer;">
              <label class="switch"><input type="checkbox" checked><span class="switch__slider"></span></label>
              <div style="flex:1;">
                <div style="font-weight: 600; font-size: 13px;">Enviar email de bienvenida</div>
                <div style="font-size: 11.5px; color: var(--text-muted);">Con credenciales y guía de acceso</div>
              </div>
            </label>
            <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--page-bg); border-radius: 6px; cursor: pointer;">
              <label class="switch"><input type="checkbox"><span class="switch__slider"></span></label>
              <div style="flex:1;">
                <div style="font-weight: 600; font-size: 13px;">Requerir 2FA</div>
                <div style="font-size: 11.5px; color: var(--text-muted);">Autenticación de dos factores obligatoria</div>
              </div>
            </label>
          </div>
        </div>

        <div class="form-section" style="background: var(--page-bg);">
          <div class="form-actions" style="border-top: none; padding-top: 0; margin-top: 0;">
            <button class="btn btn--secondary">Cancelar</button>
            <button class="btn btn--primary">${Icons.check} Crear usuario</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('d').innerHTML = `${renderSidebar('usuarios','admin')}<div class="main-area">${renderTopbar({breadcrumb:['Usuarios','Nuevo']})}${content('desktop')}</div>`;
document.getElementById('t').innerHTML = `${renderSidebar('usuarios','admin')}<div class="main-area">${renderTopbar({breadcrumb:['Usuarios','Nuevo']})}${content('tablet')}</div>`;
document.getElementById('m').innerHTML = `<div class="main-area">${renderTopbar({title:'Nuevo usuario', actions:`<button class="topbar__icon-btn">${Icons.close}</button>`})}${content('mobile')}</div>`;
</script>
</body>
</html>
