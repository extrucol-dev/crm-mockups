<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Coordinador · Estancados</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }
  .breakpoints-row { display: flex; gap: 60px; align-items: flex-start; }
  .bp-col { display: flex; flex-direction: column; }

  .estancado-row {
    display: grid;
    grid-template-columns: 60px 1fr 180px 140px 120px 120px;
    gap: 14px; align-items: center;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    transition: background 180ms;
  }
  .estancado-row:hover { background: var(--page-bg); }
  .estancado-row:last-child { border-bottom: none; }

  .dias-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 6px;
    font-weight: 700; font-size: 12px;
  }
  .dias-badge--danger { background: var(--error-bg); color: var(--error); }
  .dias-badge--warning { background: #FFF8E5; color: #B87E15; }
</style>
</head>
<body>
<div>
  <div>
    <div>
      <div>
        <div>
          <div class="app-shell" id="d"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
window.onCRMDataLoaded = function(crm) {
  function content(bp) {
    const isMobile = bp === 'mobile';

    const leadsEstancados = crm.getLeads({ estado: 'Nuevo' }).map((l, i) => ({
      type: 'LEAD',
      id: l.id,
      title: l.nombre,
      empresa: l.empresa,
      ejec: l.asesor,
      color: (i % 6) + 1,
      estado: l.estado,
      badge: 'prospecto',
      dias: parseInt(crm.getDaysAgo(l.fecha_creacion)) || 3,
      umbral: 3,
      priority: 'warning'
    }));

    const oppEstancadas = crm.getOportunidades({ estado: 'Propuesta' }).map((o, i) => ({
      type: 'OPP',
      id: o.id,
      title: o.nombre,
      empresa: o.empresa,
      ejec: o.asesor,
      color: (i % 6) + 1,
      estado: o.estado,
      badge: 'propuesta',
      dias: 9 + i,
      umbral: 7,
      priority: 'warning',
      valor: crm.formatCurrency(o.valor).replace('COP', '').trim()
    }));

    const allStancados = [...leadsEstancados, ...oppEstancadas].sort((a,b) => b.dias - a.dias);

    if (isMobile) {
      return `
        <div class="content">
          <div class="page-head">
            <div class="page-head__title-group">
              <div class="page-head__title">Estancados</div>
              <div class="page-head__subtitle">${allStancados.length} registros sin movimiento</div>
            </div>
          </div>

          <div class="tabs" style="overflow-x: auto;">
            <a class="tab is-active" style="flex-shrink: 0;">Todos <span class="tab__count">${allStancados.length}</span></a>
            <a class="tab" style="flex-shrink: 0;">Leads <span class="tab__count">${leadsEstancados.length}</span></a>
            <a class="tab" style="flex-shrink: 0;">Opp. <span class="tab__count">${oppEstancadas.length}</span></a>
          </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
          ${allStancados.map(r => `
            <div class="card">
              <div class="card__body">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                  <div style="display: flex; align-items: center; gap: 6px;">
                    <span class="badge ${r.type === 'LEAD' ? 'badge--info' : 'badge--accent'}">${r.type}</span>
                    <span class="dias-badge dias-badge--${r.priority}">${r.dias}d</span>
                  </div>
                  <span style="font-family: 'SF Mono', monospace; font-size: 10.5px; color: var(--text-muted);">${r.id}</span>
                </div>
                <div style="font-weight: 700; font-size: 13.5px; margin-bottom: 2px;">${r.title}</div>
                <div style="font-size: 11.5px; color: var(--text-muted);">${r.empresa}</div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
                  <div style="display: flex; align-items: center; gap: 6px;">
                    <div class="avatar avatar--xs avatar--color-${r.color}">${r.ejec[0]}</div>
                    <span style="font-size: 11.5px;">${r.ejec}</span>
                  </div>
                  <span class="badge badge--${r.badge}"><span class="dot"></span> ${r.estado}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Leads y Oportunidades estancadas</div>
          <div class="page-head__subtitle">${allStancados.length} registros sin actividad · Umbrales configurados: Leads &gt; 3 días · Opp &gt; 7 días</div>
        </div>
        <div class="page-head__actions">

          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
          <a href="02-variables-sistema.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
            <button class="btn btn--primary btn--sm">${Icons.adjustments} Configurar umbrales</button>
          </a>
        </div>
      </div>

      <!-- Stats -->
      <div style="display: grid; grid-template-columns: repeat(${bp === 'tablet' ? 2 : 4}, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__icon" style="background: var(--error-bg); color: var(--error);">${Icons.warning}</div>
          <div class="stat-card__label">Críticos</div>
          <div class="stat-card__value" style="color: var(--error);">${allStancados.filter(r=>r.priority==='danger').length}</div>
          <div class="stat-card__subtext">Requieren acción inmediata</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--accent">${Icons.clock}</div>
          <div class="stat-card__label">Advertencias</div>
          <div class="stat-card__value stat-card__value--accent">${allStancados.filter(r=>r.priority==='warning').length}</div>
          <div class="stat-card__subtext">Cerca del umbral</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">${Icons.funnel}</div>
          <div class="stat-card__label">Leads estancados</div>
          <div class="stat-card__value">${leadsEstancados.length}</div>
          <div class="stat-card__subtext">Sin contactar</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--accent">${Icons.briefcase}</div>
          <div class="stat-card__label">Valor en riesgo</div>
          <div class="stat-card__value stat-card__value--accent" style="font-size: 20px;">$ 780 M</div>
          <div class="stat-card__subtext">Opp. estancadas</div>
        </div>
      </div>

      <div class="tabs">
        <a class="tab is-active">Todos <span class="tab__count">${allStancados.length}</span></a>
        <a class="tab">Leads <span class="tab__count">${leadsEstancados.length}</span></a>
        <a class="tab">Oportunidades <span class="tab__count">${oppEstancadas.length}</span></a>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">${Icons.search}<input class="input input--with-icon" placeholder="Buscar por título, empresa, ejecutivo..."></div>
        <select class="select" style="max-width: 160px;"><option>Todos los ejecutivos</option></select>
        <select class="select" style="max-width: 160px;"><option>Todos los estados</option></select>
        <select class="select" style="max-width: 160px;"><option>Orden: más antiguo</option><option>Por valor (Opp)</option></select>
      </div>

      <div class="card" style="padding: 0;">
        <div class="estancado-row" style="background: var(--page-bg); font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.04em; padding: 10px 20px;">
          <div>Tipo</div>
          <div>Registro</div>
          <div>Ejecutivo</div>
          <div>Estado actual</div>
          <div>Sin actividad</div>
          <div style="text-align: right;">Acciones</div>
        </div>

        ${allStancados.map(r => `
          <div class="estancado-row">
            <div>
              <span class="badge ${r.type === 'LEAD' ? 'badge--info' : 'badge--accent'}" style="font-size: 10.5px;">${r.type}</span>
              ${r.valor ? `<div style="font-size: 11px; font-weight: 700; color: var(--accent); margin-top: 4px;">${r.valor}</div>` : ''}
            </div>
            <div>
              <div style="font-weight: 600; color: var(--text-primary);">${r.title}</div>
              <div style="font-size: 11.5px; color: var(--text-muted);">${r.empresa}</div>
              <div style="font-family: 'SF Mono', monospace; font-size: 10.5px; color: var(--text-disabled); margin-top: 2px;">${r.id}</div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="avatar avatar--xs avatar--color-${r.color}">${r.ejec.split(' ').map(x=>x[0]).join('').slice(0,2)}</div>
              <span style="font-size: 12.5px;">${r.ejec}</span>
            </div>
            <div><span class="badge badge--${r.badge}"><span class="dot"></span> ${r.estado}</span></div>
            <div>
              <span class="dias-badge dias-badge--${r.priority}">${Icons.clock.replace('class="icon"','class="icon icon--xs"')} ${r.dias} días</span>
              <div style="font-size: 10.5px; color: var(--text-muted); margin-top: 3px;">Umbral: ${r.umbral}d</div>
            </div>
<div style="text-align: right; display: flex; gap: 4px; justify-content: flex-end;">
              <a href="09-alertas.html" style="text-decoration: none;"><button class="btn btn--ghost btn--sm" title="Notificar">${Icons.bell}</button></a>
              <a href="09-perfil-ejecutivo.html" style="text-decoration: none;"><button class="btn btn--ghost btn--sm" title="Reasignar">${Icons.users}</button></a>
              <a href="../ejecutivo/04-oportunidad-detalle.html" style="text-decoration: none;">
                <button class="btn btn--ghost btn--sm" title="Ver">${Icons.chevronRight}</button>
              </a>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

document.getElementById('d').innerHTML = `${renderSidebar('estancados','coordinador')}<div class="main-area">${renderTopbar({title:'Registros estancados'})}${content('desktop')}</div>`;
};
</script>
</body>
</html>
