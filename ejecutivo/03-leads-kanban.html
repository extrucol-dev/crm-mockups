<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Leads Kanban</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.lead-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  box-shadow: var(--shadow-sm);
  cursor: grab;
  transition: all 180ms ease;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.lead-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
.lead-card__origen {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted);
}
.lead-card__title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.lead-card__empresa { font-size: 11.5px; color: var(--text-muted); }
.lead-card__intereses { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.lead-card__interes-chip {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 4px; background: var(--primary-bg); color: var(--primary);
}
.lead-card__footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 1px solid var(--border); margin-top: 2px;
}
.lead-card__score { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; color: var(--accent); }
.lead-card__age { font-size: 10.5px; color: var(--text-disabled); }
</style>
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

window.onCRMDataLoaded = function(crm) {
  const allLeads = crm.getLeads({ asesor: currentUser });

  const leadsPorEstado = {
    NUEVO: allLeads.filter(l => l.estado === 'Nuevo'),
    CONTACTADO: allLeads.filter(l => l.estado === 'Contactado'),
    INTERESADO: allLeads.filter(l => l.estado === 'Interesado'),
    ENVIADO_DISTRIBUIDOR: allLeads.filter(l => l.estado === 'Enviado a distribuidor'),
    NO_INTERESADO: allLeads.filter(l => l.estado === 'No Interesado'),
  };

  const leadsData = {
    NUEVO: { color: '#3B82F6', label: 'Nuevo', items: leadsPorEstado.NUEVO },
    CONTACTADO: { color: '#A855F7', label: 'Contactado', items: leadsPorEstado.CONTACTADO },
    INTERESADO: { color: '#F39610', label: 'Interesado', items: leadsPorEstado.INTERESADO },
    ENVIADO_DISTRIBUIDOR: { color: '#8B5CF6', label: 'Enviado a distribuidor', items: leadsPorEstado.ENVIADO_DISTRIBUIDOR },
    NO_INTERESADO: { color: '#EF4444', label: 'No Interesado', items: leadsPorEstado.NO_INTERESADO },
  };

  function renderLeadCard(l) {
    const origenColor = crm.getOrigenColor(l.origen);
    const usuario = crm.getUsuario(l.asesor);
    return `
    <a href="10-lead-detalle.html?id=${l.id}" style="text-decoration: none; color: inherit;">
      <div class="lead-card">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span class="lead-card__origen" style="color:${origenColor};font-weight:700;">${l.origen}</span>
          <button class="topbar__icon-btn" style="width:24px;height:24px;">${Icons.dots}</button>
        </div>
        <div class="lead-card__title">${l.nombre}</div>
        <div class="lead-card__empresa">${l.empresa}</div>
        <div class="lead-card__intereses">
          ${l.intereses.map(i => `<span class="lead-card__interes-chip">${i}</span>`).join('')}
        </div>
        <div class="lead-card__footer">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div class="avatar avatar--xs" style="background:${usuario?.color || '#6B7280'}">${l.asesor.substring(0,2)}</div>
            <span class="lead-card__score">${Icons.fire} ${l.score}</span>
          </div>
          <span class="lead-card__age">${crm.getDaysAgo(l.fecha_creacion)}</span>
        </div>
      </div>
    </a>`;
  }

  function renderKanbanColumn(estadoKey) {
    const col = leadsData[estadoKey];
    const cards = col.items.map(l => renderLeadCard(l)).join('');
    return `
    <div class="kanban-col">
      <div class="kanban-col__header">
        <span class="kanban-col__dot" style="background:${col.color}"></span>
        <span class="kanban-col__label">${col.label}</span>
        <span class="kanban-col__count">${col.items.length}</span>
      </div>
      <div class="kanban-col__line" style="background:${col.color}"></div>
      <div class="kanban-col__list">
        ${cards || `<div class="kanban-col__empty">Sin leads</div>`}
      </div>
    </div>`;
  }

  const total = allLeads.length;
  const estancados = allLeads.filter(l => l.estado === 'Nuevo').length;

  const html = `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis Leads</div>
          <div class="page-head__subtitle">${total} leads en seguimiento · ${estancados} sin contactar hace +2 días</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.filter} Filtros</button>
          <a href="09-lead-form.html" style="text-decoration: none;">
            <button class="btn btn--primary btn--sm">${Icons.plus} Nuevo lead</button>
          </a>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">
          ${Icons.search}
          <input class="input input--with-icon" placeholder="Buscar por título, empresa, origen...">
        </div>
        <select class="select" style="max-width: 180px;">
          <option>Todos los orígenes</option>
          <option>WhatsApp</option>
          <option>Instagram</option>
          <option>Facebook</option>
        </select>
        <select class="select" style="max-width: 180px;">
          <option>Todos los intereses</option>
          <option>TUBERIA</option>
          <option>EQUIPOS</option>
          <option>ACCESORIOS/MEDIDORES</option>
        </select>
      </div>

      ${estancados > 0 ? `
      <div class="alert alert--warning" style="margin-bottom: 16px;">
        ${Icons.warning}
        <div>
          <strong>${estancados} leads estancados.</strong> Tienes leads en estado "Nuevo" sin contactar hace más de 2 días.
          El sistema enviará notificación al coordinador si superan 3 días.
        </div>
      </div>
      ` : ''}

      <div class="kanban" style="grid-template-columns: repeat(5, 1fr);">
        ${renderKanbanColumn('NUEVO')}
        ${renderKanbanColumn('CONTACTADO')}
        ${renderKanbanColumn('INTERESADO')}
        ${renderKanbanColumn('ENVIADO_DISTRIBUIDOR')}
        ${renderKanbanColumn('NO_INTERESADO')}
      </div>
    </div>
  `;

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('leads', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ title: 'Mis Leads' }) +
      html +
    '</div>';
};
</script>
</body>
</html>
