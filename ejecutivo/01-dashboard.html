<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Dashboard</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  /* Canvas styles */
  .canvas-title {
    font-family: 'Roboto', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #1A1A1A;
    margin-bottom: 6px;
  }
  .canvas-subtitle {
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    color: #6B6B6B;
    margin-bottom: 40px;
  }
  .breakpoints-row {
    display: flex;
    gap: 60px;
    align-items: flex-start;
  }
  .bp-col {
    display: flex;
    flex-direction: column;
  }
</style>
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
window.onCRMDataLoaded = function(crm) {
  const currentUser = 'PAOLA';

  function dashboardContent(bp = 'desktop') {
    const metricas = crm.getMetricas();
    const misOportunidades = crm.getOportunidades({ asesor: currentUser });
    const misLeads = crm.getLeads({ asesor: currentUser });
    const misActividades = crm.getActividades({ asesor: currentUser }).slice(0, 5);

    const activas = misOportunidades.filter(o => !['Cerrada Ganada', 'Cerrada Perdida'].includes(o.estado)).length;
    const pipeline = misOportunidades.filter(o => !['Cerrada Ganada', 'Cerrada Perdida'].includes(o.estado)).reduce((sum, o) => sum + (o.valor || 0), 0);
    const ganancias = misOportunidades.filter(o => o.estado === 'Cerrada Ganada').reduce((sum, o) => sum + (o.valor || 0), 0);

    const statCards = `
      <div class="stat-card">
        <div class="stat-card__icon">${Icons.briefcase}</div>
        <div class="stat-card__label">Oportunidades activas</div>
        <div class="stat-card__value">${activas}</div>
        <div class="stat-card__subtext">
          <span class="stat-card__trend stat-card__trend--up">+${Math.floor(activas * 0.15)}</span>
          vs mes anterior
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--accent">${Icons.currency}</div>
        <div class="stat-card__label">Pipeline activo</div>
        <div class="stat-card__value stat-card__value--accent">${crm.formatCurrency(pipeline).replace('COP', '').trim()}</div>
        <div class="stat-card__subtext">COP estimados</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--success">${Icons.clipboardCheck}</div>
        <div class="stat-card__label">Actividades semana</div>
        <div class="stat-card__value stat-card__value--success">${misActividades.length}</div>
        <div class="stat-card__subtext">
          <span class="stat-card__trend stat-card__trend--up">+${Math.floor(misActividades.length * 0.3)}</span>
          esta semana
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--green">${Icons.trophy}</div>
        <div class="stat-card__label">Oportunidades ganadas</div>
        <div class="stat-card__value stat-card__value--green">${misOportunidades.filter(o => o.estado === 'Cerrada Ganada').length}</div>
        <div class="stat-card__subtext">Este trimestre</div>
      </div>
    `;

    const estadoCounts = {
      PROSPECTO: misOportunidades.filter(o => o.estado === 'Prospeccion').length,
      CALIFICACION: misOportunidades.filter(o => o.estado === 'Calificacion').length,
      PROPUESTA: misOportunidades.filter(o => o.estado === 'Propuesta').length,
      NEGOCIACION: misOportunidades.filter(o => o.estado === 'Negociacion').length,
    };
    const totalOpp = Object.values(estadoCounts).reduce((a, b) => a + b, 0) || 1;

    const estados = [
      { label: 'Prospección', count: estadoCounts.PROSPECTO, pct: estadoCounts.PROSPECTO / totalOpp * 100, badge: 'prospecto' },
      { label: 'Calificación', count: estadoCounts.CALIFICACION, pct: estadoCounts.CALIFICACION / totalOpp * 100, badge: 'calificacion' },
      { label: 'Propuesta', count: estadoCounts.PROPUESTA, pct: estadoCounts.PROPUESTA / totalOpp * 100, badge: 'propuesta' },
      { label: 'Negociación', count: estadoCounts.NEGOCIACION, pct: estadoCounts.NEGOCIACION / totalOpp * 100, badge: 'negociacion' },
    ];

    const estadosHTML = estados.map(e => `
      <div style="display: flex; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--border);">
        <span class="badge badge--${e.badge}" style="min-width: 100px;"><span class="dot"></span> ${e.label}</span>
        <div class="progress" style="flex:1;">
          <div class="progress__bar"><div class="progress__fill" style="width: ${e.pct * 3}%"></div></div>
        </div>
        <span style="font-weight:700; color: var(--text-primary); min-width: 30px; text-align: right;">${e.count}</span>
      </div>
    `).join('');

    const actividadesHTML = misActividades.map(a => `
      <div class="activity-item">
        <div class="activity-item__dot"></div>
        <div class="activity-item__body">
          <div class="activity-item__title">
            ${a.descripcion.substring(0, 50)}${a.descripcion.length > 50 ? '...' : ''}
            <span class="badge badge--ganada" style="font-size: 10.5px; padding: 1px 8px;">completada</span>
          </div>
          <div class="activity-item__desc">Lead: ${a.lead_id} · ${a.tipo}</div>
          <div class="activity-item__meta">
            ${Icons.clock}
            <span>${crm.formatDate(a.fecha)}</span>
          </div>
        </div>
      </div>
    `).join('');

    const leadsOrdenados = [...misLeads].sort((a, b) => b.score - a.score).slice(0, 3);
    const leadsHTML = leadsOrdenados.map(l => {
      const usuario = crm.getUsuario(l.asesor);
      return `
        <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);">
          <div class="avatar avatar--sm avatar--accent">${l.nombre.substring(0,2).toUpperCase()}</div>
          <div style="flex:1; min-width: 0;">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-primary);">${l.nombre}</div>
            <div style="font-size: 11.5px; color: var(--text-muted);">${l.intereses[0] || 'Sin interes'}</div>
          </div>
          <div style="display: flex; align-items: center; gap: 4px;">
            ${Icons.fire}
            <span style="font-weight: 700; color: var(--accent); font-size: 13px;">${l.score}</span>
          </div>
        </div>
      `;
    }).join('');

    const isCompact = bp === 'mobile' || bp === 'tablet';

    return `
      <div class="content">
        <div class="page-head">
          <div class="page-head__title-group">
            <div class="page-head__title">Hola, ${currentUser} 👋</div>
            <div class="page-head__subtitle">Aquí está el resumen de tu semana comercial</div>
          </div>
          ${bp !== 'mobile' ? `
            <div class="page-head__actions">
              <button class="btn btn--secondary btn--sm">${Icons.calendar} Esta semana</button>
              <a href="05-oportunidad-form.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
                  <button class="btn btn--primary btn--sm">${Icons.plus} Nueva oportunidad</button></a>
            </div>
          ` : ''}
        </div>

        <div style="display: grid; grid-template-columns: repeat(${bp === 'desktop' ? 4 : 2}, 1fr); gap: 12px; margin-bottom: 20px;">
          ${statCards}
        </div>

        <div style="display: grid; grid-template-columns: ${isCompact ? '1fr' : '1.2fr 1fr'}; gap: 16px;">
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div class="card">
              <div class="card__header">
                <div>
                  <div class="card__title">Oportunidades por estado</div>
                  <div class="card__subtitle">Distribución de tu pipeline activo</div>
                </div>
                <a href="02-oportunidades-kanban.html" style="text-decoration: none;"><button class="btn btn--ghost btn--sm">Ver todas ${Icons.arrowRight}</button></a>
              </div>
              <div class="card__body" style="padding-top: 4px; padding-bottom: 4px;">
                ${estadosHTML}
              </div>
            </div>

            <div class="card">
              <div class="card__header">
                <div>
                  <div class="card__title">Leads más activos</div>
                  <div class="card__subtitle">Tus prospectos con mayor probabilidad de conversión</div>
                </div>
                <span class="badge badge--accent">${Icons.sparkles} Top 3</span>
              </div>
              <div class="card__body" style="padding-top: 4px; padding-bottom: 4px;">
                ${leadsHTML}
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card__header">
              <div>
                <div class="card__title">Mis últimas actividades</div>
                <div class="card__subtitle">Registro cronológico</div>
              </div>
              <a href="07-actividades.html" style="text-decoration: none;"><button class="btn btn--ghost btn--sm">Ver historial</button></a>
            </div>
            <div class="card__body" style="padding-top: 0; padding-bottom: 4px;">
              ${actividadesHTML}
            </div>
            <div class="card__footer" style="justify-content: center;">
              <button class="btn btn--secondary btn--block btn--sm">${Icons.plus} Registrar actividad</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  document.getElementById('desktop-shell').innerHTML = `
    ${renderSidebar('dashboard', 'ejecutivo')}
    <div class="main-area">
      ${renderTopbar({ title: 'Mi Dashboard' })}
      ${dashboardContent('desktop')}
    </div>
  `;

  document.getElementById('tablet-shell').innerHTML = `
    ${renderSidebar('dashboard', 'ejecutivo')}
    <div class="main-area">
      ${renderTopbar({ title: 'Mi Dashboard' })}
      ${dashboardContent('tablet')}
    </div>
  `;

  document.getElementById('mobile-shell').innerHTML = `
    <div class="main-area">
      ${renderTopbar({ title: 'Dashboard' })}
      ${dashboardContent('mobile')}
      ${renderMobileBottomNav('dashboard')}
    </div>
  `;
};
</script>
</body>
</html>
