<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Actividades</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.activity-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  transition: background 180ms; cursor: pointer;
}
.activity-row:hover { background: var(--page-bg); }
.activity-row__icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--primary-bg); color: var(--primary);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.activity-row__icon--llamada { background: #E8F5EE; color: var(--success); }
.activity-row__icon--email { background: #F3E8FF; color: #7C3AED; }
.activity-row__icon--visita { background: var(--accent-bg); color: #C7770D; }
.activity-row__icon--reunion { background: var(--primary-bg); color: var(--primary); }

.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--text-primary); color: #fff; padding: 12px 20px;
  border-radius: 8px; font-size: 14px; font-weight: 600;
  box-shadow: var(--shadow-lg); display: none; align-items: center; gap: 8px;
}
.toast.is-success { background: var(--success); }
.toast.is-error { background: var(--error); }
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';
let currentView = 'list';

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast is-' + type;
  t.style.display = 'flex';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

const tipoIconMap = { LLAMADA: 'phone', EMAIL: 'envelope', VISITA: 'mapPin', REUNION: 'view' };
const tipoColorMap = { LLAMADA: 'llamada', EMAIL: 'email', VISITA: 'visita', REUNION: 'reunion' };
const tipoLabels = { LLAMADA: 'Llamada', EMAIL: 'Email', VISITA: 'Visita', REUNION: 'Reunion' };

function activityRowFromData(a, crm) {
  const iconKey = tipoIconMap[a.tipo] || 'circle';
  const colorClass = tipoColorMap[a.tipo] || '';
  const lead = (crm.data && crm.data.leads) ? crm.data.leads.find(l => l.id === a.lead_id) : null;
  const leadEmpresa = lead ? lead.empresa : (a.lead_id || '');
  return `<div class="activity-row" onclick="window.location.href='10-lead-detalle.html?id=${a.lead_id}'">
    <div class="activity-row__icon activity-row__icon--${colorClass}">${Icons[iconKey]}</div>
    <div style="flex:1; min-width: 0;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
        <span style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${(a.descripcion || '').substring(0, 65)}${a.descripcion && a.descripcion.length > 65 ? '...' : ''}</span>
        ${a.gps_lat ? `<span class="badge badge--ganada" style="font-size:9px;"><span class="dot"></span> GPS</span>` : ''}
      </div>
      <div style="font-size: 12.5px; color: var(--text-muted);">${a.lead_id || ''} · ${leadEmpresa}</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;">
      <span class="badge badge--${a.completada ? 'ganada' : 'prospecto'}"><span class="dot"></span> ${a.completada ? 'Completada' : 'Pendiente'}</span>
      <span style="font-size: 12px; color: var(--text-muted);">${crm.formatDate(a.fecha)}</span>
    </div>
  </div>`;
}

window.onCRMDataLoaded = function(crm) {
  window._crmInstance = crm;

  function renderList() {
    const misAct = crm.getActividades({ asesor: currentUser });
    const hoy = new Date().toISOString().split('T')[0];
    const ayer = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    const hoyActs = misAct.filter(a => a.fecha === hoy);
    const ayerActs = misAct.filter(a => a.fecha === ayer);
    const otrasActs = misAct.filter(a => a.fecha !== hoy && a.fecha !== ayer);
    const todayStr = new Date().toLocaleDateString('es-CO', { day: '2-digit', month: 'long' });

    return `<div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis actividades</div>
          <div class="page-head__subtitle">${misAct.length} actividades · ${hoyActs.length} completadas hoy</div>
        </div>
        <div class="page-head__actions">
          <a href="13-actividad-detalle.html" style="text-decoration: none;">
            <button class="btn btn--primary btn--sm">${Icons.plus} Registrar</button>
          </a>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">${Icons.search}<input class="input input--with-icon" placeholder="Buscar actividad..."></div>
        <select class="select" style="max-width: 160px;">
          <option>Todos los tipos</option>
          <option>LLAMADA</option><option>VISITA</option><option>EMAIL</option><option>REUNION</option>
        </select>
        <select class="select" style="max-width: 160px;">
          <option>Esta semana</option><option>Hoy</option><option>Este mes</option>
        </select>
      </div>

      <div class="card" style="padding: 0;">
        ${hoyActs.length > 0 ? `
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--page-bg); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">Hoy · ${todayStr}</span>
          <span style="font-size: 12px; color: var(--text-muted);">${hoyActs.length} actividades</span>
        </div>
        ${hoyActs.map(a => activityRowFromData(a, crm)).join('')}` : ''}
        ${ayerActs.length > 0 ? `
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--page-bg); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">Ayer</span>
          <span style="font-size: 12px; color: var(--text-muted);">${ayerActs.length} actividad${ayerActs.length !== 1 ? 'es' : ''}</span>
        </div>
        ${ayerActs.map(a => activityRowFromData(a, crm)).join('')}` : ''}
        ${otrasActs.length > 0 ? `
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--page-bg); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">Anteriores</span>
          <span style="font-size: 12px; color: var(--text-muted);">${otrasActs.length} actividades</span>
        </div>
        ${otrasActs.map(a => activityRowFromData(a, crm)).join('')}` : ''}
        ${misAct.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--text-muted);">Sin actividades registradas</div>' : ''}
      </div>
    </div>`;
  }

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('actividades', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ title: 'Mis actividades' }) +
      renderList() +
    '</div>';
};
</script>
</body>
</html>
