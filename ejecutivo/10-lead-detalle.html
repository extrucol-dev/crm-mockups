<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Detalle Lead</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--text-primary); color: #fff; padding: 12px 20px;
  border-radius: 8px; font-size: 14px; font-weight: 600;
  box-shadow: var(--shadow-lg); display: none; align-items: center; gap: 8px;
}
.toast.is-success { background: var(--success); }
.toast.is-error { background: var(--error); }
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.className = 'toast is-' + type;
  toast.style.display = 'flex';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

window.onCRMDataLoaded = function(crm) {
  const params = new URLSearchParams(window.location.search);
  const leadId = params.get('id') || 'L007';
  const lead = crm.data.leads.find(l => l.id === leadId) || crm.data.leads[0];
  const origenColor = crm.getOrigenColor(lead.origen);
  const usuario = crm.getUsuario(lead.asesor);

  const leadActs = crm.getActividades({ lead_id: lead.id });
  const actCount = leadActs.length;
  const tipoColorMap = { VISITA: 'visita', LLAMADA: 'llamada', EMAIL: 'email', REUNION: 'reunion' };
  const tipoIconMap = { VISITA: 'mapPin', LLAMADA: 'phone', EMAIL: 'envelope', REUNION: 'view' };

  const actividadesHTML = actCount > 0 ? `<div class="card">
    <div class="card__header">
      <div><div class="card__title">Actividades</div><div class="card__subtitle">${actCount} registrada${actCount !== 1 ? 's' : ''}</div></div>
      <a href="07-actividades.html" style="text-decoration:none;"><button class="btn btn--ghost btn--sm">${Icons.plus}</button></a>
    </div>
    <div class="card__body">
      <div class="timeline">
        ${leadActs.slice(0, 5).map((a, i) => `<div class="timeline__item">
          <div class="timeline__dot ${a.completada ? 'timeline__dot--success' : ''}"></div>
          <div class="timeline__header">
            <div class="timeline__title">${a.descripcion.substring(0, 60)}${a.descripcion.length > 60 ? '...' : ''}</div>
            <span class="timeline__date">${crm.formatDate(a.fecha)}</span>
          </div>
          <div class="timeline__desc">${a.notas || ''}</div>
          <div style="display: flex; gap: 6px; margin-top: 6px;">
            <span class="badge badge--${tipoColorMap[a.tipo] || 'neutral'}">${(Icons[tipoIconMap[a.tipo]] || Icons.view).replace('class="icon"','class="icon icon--xs"')} ${a.tipo}</span>
            ${a.completada ? '<span class="badge badge--ganada"><span class="dot"></span> Completada</span>' : '<span class="badge badge--prospecto"><span class="dot"></span> Pendiente</span>'}
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>` : `<div class="card"><div class="card__header"><div class="card__title">Actividades</div></div><div class="card__body" style="color:var(--text-muted);text-align:center;padding:24px;">Sin actividades registradas</div></div>`;

  const interesesHTML = `<div class="card">
    <div class="card__header">
      <div class="card__title">Intereses del lead</div>
      <span class="badge badge--info">${lead.intereses.length} seleccionados</span>
    </div>
    <div class="card__body" style="display: flex; flex-wrap: wrap; gap: 8px;">
      ${lead.intereses.map(i => `<span class="badge badge--info" style="padding: 6px 12px;">${Icons.tag.replace('class="icon"','class="icon icon--xs"')} ${i}</span>`).join('')}
    </div>
  </div>`;

  const historialHTML = `<div class="card">
    <div class="card__header"><div class="card__title">Historial de estados</div></div>
    <div class="card__body">
      <div class="timeline">
        ${lead.comentarios.slice().reverse().map((c, i) => `
        <div class="timeline__item">
          <div class="timeline__dot ${i > 0 ? 'timeline__dot--muted' : ''}"></div>
          <div class="timeline__header">
            <div class="timeline__title">${lead.estado}</div>
            <span class="timeline__date">${crm.formatDate(c.fecha)}</span>
          </div>
          <div class="timeline__desc">${c.texto}</div>
        </div>
        `).join('')}
      </div>
    </div>
  </div>`;

  const sidePanel = `<div style="display: flex; flex-direction: column; gap: 12px;">
    <div class="card">
      <div class="card__header"><div class="card__title">Contacto</div></div>
      <div class="card__body">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
          <div class="avatar avatar--color-2">${lead.nombre.substring(0,2).toUpperCase()}</div>
          <div>
            <div style="font-weight: 700;">${lead.nombre}</div>
            <div style="font-size: 12px; color: var(--text-muted);">${lead.empresa}</div>
          </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 13px;">
          ${lead.telefono ? `<a style="color: var(--primary); display: flex; align-items: center; gap: 6px; cursor: pointer;">${Icons.phone} ${lead.telefono}</a>` : ''}
          ${lead.email ? `<a style="color: var(--primary); display: flex; align-items: center; gap: 6px; cursor: pointer;">${Icons.envelope} ${lead.email}</a>` : ''}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header"><div class="card__title">Informacion</div></div>
      <div class="card__body">
        <dl class="detail-info-list">
          <dt>Origen</dt><dd>${lead.origen}</dd>
          <dt>Empresa</dt><dd>${lead.empresa}</dd>
          <dt>Ciudad</dt><dd>${lead.ciudad}</dd>
          <dt>Ejecutivo</dt><dd>
            <div style="display: flex; align-items: center; gap: 6px;">
              <div class="avatar avatar--xs" style="background:${usuario?.color || '#6B7280'}">${lead.asesor.substring(0,2)}</div>
              <span>${lead.asesor}</span>
            </div>
          </dd>
          <dt>Score</dt><dd style="color: var(--accent); font-weight: 700;">${lead.score} / 100</dd>
          <dt>Edad</dt><dd>${crm.getDaysAgo(lead.fecha_creacion)}</dd>
          <dt>Tipo</dt><dd><span class="badge badge--${lead.tipo_cliente === 'ACTIVO' ? 'ganada' : 'info'}">${lead.tipo_cliente}</span></dd>
        </dl>
      </div>
    </div>

    <div class="card">
      <div class="card__header"><div class="card__title">Estado del lead</div></div>
      <div class="card__body" style="display: flex; flex-direction: column; gap: 8px;">
        <div class="form-field" style="margin: 0;">
          <label class="form-field__label">Cambiar estado</label>
          <select class="select" id="lead-estado-select" onchange="actualizarEstadoLead('${lead.id}', this.value)">
            <option value="Nuevo" ${lead.estado === 'Nuevo' ? 'selected' : ''}>Nuevo</option>
            <option value="Contactado" ${lead.estado === 'Contactado' ? 'selected' : ''}>Contactado</option>
            <option value="Interesado" ${lead.estado === 'Interesado' ? 'selected' : ''}>Interesado</option>
            <option value="Enviado a distribuidor" ${lead.estado === 'Enviado a distribuidor' ? 'selected' : ''}>Enviado a distribuidor</option>
            <option value="No Interesado" ${lead.estado === 'No Interesado' ? 'selected' : ''}>No Interesado</option>
          </select>
        </div>
        <div id="estado-msg" style="font-size:12px;color:var(--success);display:none;">Estado actualizado</div>
      </div>
    </div>

    <div class="card">
      <div class="card__header"><div class="card__title">Acciones</div></div>
      <div class="card__body" style="display: flex; flex-direction: column; gap: 8px;">
        <a href="16-lead-conversion.html" style="text-decoration: none;">
          <button class="btn btn--primary btn--sm" style="background: var(--success); width: 100%;">${Icons.arrowRight} Convertir a oportunidad</button>
        </a>
        <button class="btn btn--secondary btn--block">${Icons.arrowRight} Trasladar a distribuidor</button>
        <button class="btn btn--secondary btn--block" style="color: var(--error); border-color: var(--error-border);">${Icons.xCircle} Descalificar lead</button>
      </div>
    </div>
  </div>`;

  const headerHTML = `<div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;">
    <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
      <a href="03-leads-kanban.html" style="color: var(--primary); cursor: pointer;">Leads</a>
      <span>/</span>
      <span>${lead.id}</span>
    </div>
    <div style="display: flex; justify-content: space-between; gap: 16px;">
      <div style="flex: 1;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
          <span class="badge badge--calificacion"><span class="dot"></span> ${lead.estado}</span>
          <span class="badge badge--info" style="background:${origenColor}20; color:${origenColor};">${lead.origen}</span>
          <span class="badge badge--accent">${Icons.fire.replace('class="icon"','class="icon icon--xs"')} Score ${lead.score}</span>
        </div>
        <div style="font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1.2;">${lead.nombre}</div>
        <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">${lead.empresa} · ${lead.ciudad} · ${crm.getDaysAgo(lead.fecha_creacion)}</div>
      </div>
      <div style="display: flex; gap: 8px; flex-shrink: 0;">
        <button class="btn btn--secondary btn--sm">${Icons.pencil} Editar</button>
        <button class="btn btn--secondary btn--sm">${Icons.xCircle} Descalificar</button>
        <a href="16-lead-conversion.html" style="text-decoration: none;">
          <button class="btn btn--primary btn--sm" style="background: var(--success);">${Icons.arrowRight} Convertir</button>
        </a>
      </div>
    </div>
  </div>`;

  const html = `<div class="content">
    ${headerHTML}
    <div style="display: grid; gap: 16px; grid-template-columns: 1fr 320px;">
      <div style="display: flex; flex-direction: column; gap: 16px; min-width: 0;">
        ${interesesHTML}
        ${actividadesHTML}
        ${historialHTML}
      </div>
      ${sidePanel}
    </div>
  </div>`;

  window.actualizarEstadoLead = function(id, nuevoEstado) {
    crm.updateLead(id, { estado: nuevoEstado });
    crm.recalculateMetricas();
    const msg = document.getElementById('estado-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
  };

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('leads', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ breadcrumb: ['Leads', lead.id] }) +
      html +
    '</div>';
};
</script>
</body>
</html>
