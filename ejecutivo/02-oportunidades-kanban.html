<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Oportunidades Kanban</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }
  .closed-toggle {
    margin-top: 20px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

let closedExpanded = false;
function toggleClosed() {
  closedExpanded = !closedExpanded;
  const section = document.getElementById('closed-kanban');
  const icon = document.getElementById('closed-toggle-icon');
  if (closedExpanded) {
    section.style.display = 'block';
    icon.innerHTML = Icons.chevronDown;
  } else {
    section.style.display = 'none';
    icon.innerHTML = Icons.chevronRight;
  }
}

window.onCRMDataLoaded = function(crm) {
  const misOpp = crm.getOportunidades({ asesor: currentUser });

  const estadoLabels = {
    PROSPECTO:   { label: 'Prospección',  badgeClass: 'prospecto',  color: '#3B82F6' },
    CALIFICACION:{ label: 'Calificación', badgeClass: 'calificacion', color: '#F97316' },
    PROPUESTA:   { label: 'Propuesta',    badgeClass: 'propuesta',  color: '#A855F7' },
    NEGOCIACION: { label: 'Negociación',  badgeClass: 'negociacion', color: '#EAB308' },
    GANADA:      { label: 'Ganada',       badgeClass: 'ganada',     color: '#22C55E' },
    PERDIDA:     { label: 'Perdida',       badgeClass: 'perdida',    color: '#EF4444' },
  };

  const oppPorEstado = {
    PROSPECTO:    misOpp.filter(o => o.estado === 'Prospeccion'),
    CALIFICACION: misOpp.filter(o => o.estado === 'Calificacion'),
    PROPUESTA:    misOpp.filter(o => o.estado === 'Propuesta'),
    NEGOCIACION:  misOpp.filter(o => o.estado === 'Negociacion'),
    GANADA:       misOpp.filter(o => o.estado === 'Cerrada Ganada'),
    PERDIDA:      misOpp.filter(o => o.estado === 'Cerrada Perdida'),
  };

  function renderKanbanCard(op) {
    const estadoKey = Object.keys(estadoLabels).find(k => estadoLabels[k].label === op.estado) || 'PROSPECTO';
    const s = estadoLabels[estadoKey];
    return `
      <a href="04-oportunidad-detalle.html?id=${op.id}" style="text-decoration: none; color: inherit;">
        <div class="kanban-card">
          <span class="badge badge--${s.badgeClass}"><span class="dot"></span> ${op.estado}</span>
          <div class="kanban-card__title">${op.nombre}</div>
          <div class="kanban-card__company">${op.empresa}</div>
          <div class="kanban-card__value">${crm.formatCurrency(op.valor).replace('COP', '').trim()}</div>
          <div class="kanban-card__footer">
            <span class="kanban-card__date">${Icons.calendar} ${crm.formatDate(op.fecha_cierre)}</span>
            <div class="avatar avatar--xs">${op.asesor.substring(0,2)}</div>
          </div>
        </div>
      </a>
    `;
  }

  function renderKanbanColumn(estadoKey) {
    const col = oppPorEstado[estadoKey];
    const s = estadoLabels[estadoKey];
    const cards = col.map(op => renderKanbanCard(op)).join('');
    return `
      <div class="kanban-col">
        <div class="kanban-col__header">
          <span class="kanban-col__dot" style="background:${s.color}"></span>
          <span class="kanban-col__label">${s.label}</span>
          <span class="kanban-col__count">${col.length}</span>
        </div>
        <div class="kanban-col__line" style="background:${s.color}"></div>
        <div class="kanban-col__list">
          ${cards || `<div class="kanban-col__empty">Sin oportunidades</div>`}
        </div>
      </div>
    `;
  }

  const total = misOpp.length;
  const totalPipeline = misOpp.filter(o => !['Cerrada Ganada', 'Cerrada Perdida'].includes(o.estado)).reduce((s, o) => s + (o.valor || 0), 0);
  const ganadas = oppPorEstado.GANADA.length;
  const perdidas = oppPorEstado.PERDIDA.length;

  const html = `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis Oportunidades</div>
          <div class="page-head__subtitle">
            ${total} oportunidades · ${crm.formatCurrency(totalPipeline).replace('COP', '').trim()} en pipeline
          </div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.filter} Filtros</button>
          <a href="05-oportunidad-form.html" style="text-decoration: none; color: inherit;">
            <button class="btn btn--primary btn--sm">${Icons.plus} Nueva oportunidad</button>
          </a>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">
          ${Icons.search}
          <input class="input input--with-icon" placeholder="Buscar por título, empresa...">
        </div>
        <select class="select" style="max-width: 180px;">
          <option>Todos los sectores</option>
          <option>Agua</option>
          <option>Industria</option>
          <option>Construccion</option>
        </select>
        <select class="select" style="max-width: 180px;">
          <option>Todos los tipos</option>
          <option>Licitación</option>
          <option>Suministro</option>
          <option>Proyecto</option>
        </select>
        <div style="margin-left:auto; display: flex; gap: 8px; align-items: center; font-size: 12.5px; color: var(--text-muted);">
          ${Icons.arrowsUpDown}
          <span>Ordenar:</span>
          <select class="select" style="max-width: 140px; padding: 6px 32px 6px 10px;">
            <option>Fecha reciente</option>
            <option>Valor mayor</option>
            <option>Cierre próximo</option>
          </select>
        </div>
      </div>

      <div class="kanban kanban--4">
        ${renderKanbanColumn('PROSPECTO')}
        ${renderKanbanColumn('CALIFICACION')}
        ${renderKanbanColumn('PROPUESTA')}
        ${renderKanbanColumn('NEGOCIACION')}
      </div>

      <div id="closed-section">
        <div class="closed-toggle" onclick="toggleClosed()" style="cursor: pointer;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <span id="closed-toggle-icon">${Icons.chevronRight}</span>
            <span style="font-weight: 600; color: var(--text-primary);">Oportunidades cerradas</span>
            <span class="badge badge--ganada"><span class="dot"></span> ${ganadas} ganadas</span>
            <span class="badge badge--perdida"><span class="dot"></span> ${perdidas} perdida</span>
          </div>
          <span style="font-size: 12px; color: var(--text-muted);">Este trimestre</span>
        </div>
        <div id="closed-kanban" style="display: none; margin-top: 12px;">
          <div class="kanban kanban--2">
            ${renderKanbanColumn('GANADA')}
            ${renderKanbanColumn('PERDIDA')}
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('desktop-shell').innerHTML = `
    ${renderSidebar('oportunidades', 'ejecutivo')}
    <div class="main-area">
      ${renderTopbar({ title: 'Mis Oportunidades' })}
      ${html}
    </div>
  `;
};
</script>
</body>
</html>
