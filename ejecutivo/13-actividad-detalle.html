<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Detalle Actividad</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.activity-row__icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--primary-bg); color: var(--primary);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.activity-row__icon--llamada { background: #E8F5EE; color: var(--success); }
.activity-row__icon--email { background: #F3E8FF; color: #7C3AED; }
.activity-row__icon--visita { background: var(--accent-bg); color: #C7770D; }
.activity-row__icon--reunion { background: var(--primary-bg); color: var(--primary); }

.big-map {
  height: 280px; border-radius: 8px;
  background-color: #E8EEF5;
  background-image:
    linear-gradient(rgba(36, 56, 140, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(36, 56, 140, 0.06) 1px, transparent 1px),
    radial-gradient(circle at 30% 40%, rgba(243, 150, 16, 0.1), transparent 50%);
  background-size: 24px 24px, 24px 24px, auto;
  position: relative; overflow: hidden; border: 1px solid var(--border);
}
.map-main-pin {
  position: absolute; top: 45%; left: 50%;
  transform: translate(-50%, -100%);
  width: 36px; height: 36px; background: var(--primary);
  border: 4px solid #fff; border-radius: 50%;
  box-shadow: 0 4px 12px rgba(36, 56, 140, 0.4); z-index: 2;
}
.map-main-pin::after {
  content: ''; position: absolute; left: 50%; bottom: -10px;
  transform: translateX(-50%); width: 2px; height: 10px; background: var(--primary);
}
.map-main-pin::before {
  content: ''; position: absolute; inset: 6px;
  background: #fff; border-radius: 50%;
}
.pulse-ring {
  position: absolute; top: 45%; left: 50%;
  transform: translate(-50%, -100%);
  width: 60px; height: 60px; border-radius: 50%;
  border: 2px solid var(--primary); opacity: 0.3;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { transform: translate(-50%, -100%) scale(0.5); opacity: 0.6; }
  100% { transform: translate(-50%, -100%) scale(2); opacity: 0; }
}
.gps-indicator {
  position: absolute; top: 12px; left: 12px;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(6px);
  padding: 6px 12px; border-radius: 999px;
  font-size: 11.5px; font-weight: 600; color: var(--success);
  display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-sm);
}
.gps-indicator::before {
  content: ''; width: 8px; height: 8px;
  background: var(--green-bright); border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
  animation: blink 1.5s ease infinite;
}
@keyframes blink { 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
window.onCRMDataLoaded = function(crm) {
  const params = new URLSearchParams(window.location.search);
  const defaultActId = crm.data.actividades && crm.data.actividades.length > 0 ? crm.data.actividades[0].id : 'ACT-001';
  const actId = params.get('id') || defaultActId;
  const act = (crm.data.actividades || []).find(a => a.id === actId) || (crm.data.actividades || [])[0];

  const actIconMap = { VISITA: 'mapPin', LLAMADA: 'phone', EMAIL: 'envelope', REUNION: 'view' };
  const actColorMap = { VISITA: 'visita', LLAMADA: 'llamada', EMAIL: 'email', REUNION: 'reunion' };
  const tipoLabel = act.tipo.charAt(0) + act.tipo.slice(1).toLowerCase();
  const relatedLead = act.lead_id ? crm.data.leads.find(l => l.id === act.lead_id) : null;

  let gpsSection = '';
  if (act.gps_lat) {
    gpsSection = `<div class="card">
      <div class="card__header">
        <div><div class="card__title">Ubicacion</div><div class="card__subtitle">Coordenadas capturadas durante la actividad</div></div>
        <span class="badge badge--ganada"><span class="dot"></span> Conectado</span>
      </div>
      <div style="padding: 16px;">
        <div class="big-map">
          <div class="gps-indicator">GPS activo</div>
          <div class="pulse-ring"></div>
          <div class="map-main-pin"></div>
          <div style="position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(255,255,255,0.95); backdrop-filter: blur(6px); padding: 10px 14px; border-radius: 8px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 10px;">
            ${Icons.mapPin}
            <div style="flex:1; min-width: 0;">
              <div style="font-size: 12.5px; font-weight: 600; color: var(--text-primary);">${act.gps_direccion || 'Ubicacion registrada'}</div>
              <div style="font-size: 11px; color: var(--text-muted);">Lat: ${act.gps_lat}, Lng: ${act.gps_lng}</div>
            </div>
            <button class="btn btn--ghost btn--sm">${Icons.gps}</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  const html = `
    <div class="content">
      <div style="max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px;">
        <div class="card">
          <div class="card__body" style="display: flex; flex-direction: column; gap: 16px;">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="activity-row__icon activity-row__icon--${actColorMap[act.tipo] || 'reunion'}">${Icons[actIconMap[act.tipo]] || Icons.view}</div>
              <div>
                <div style="font-weight: 700; font-size: 16px; color: var(--text-primary);">${act.descripcion.substring(0, 80)}</div>
                <div style="font-size: 13px; color: var(--text-muted);">${crm.formatDate(act.fecha)} · ${act.asesor}</div>
              </div>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              <span class="badge badge--${actColorMap[act.tipo] || 'neutral'}">${Icons[actIconMap[act.tipo]].replace('class="icon"','class="icon icon--xs"')} ${tipoLabel}</span>
              <span class="badge badge--${act.completada ? 'ganada' : 'prospecto'}"><span class="dot"></span> ${act.completada ? 'Completada' : 'Pendiente'}</span>
              ${act.gps_lat ? '<span class="badge badge--ganada"><span class="dot"></span> GPS</span>' : ''}
            </div>
          </div>
        </div>

        ${gpsSection}

        <div class="card">
          <div class="card__header"><div class="card__title">Informacion</div></div>
          <div class="card__body">
            <dl class="detail-info-list">
              ${relatedLead ? '<dt>Lead relacionado</dt><dd><a href="10-lead-detalle.html?id=' + relatedLead.id + '" style="color: var(--primary);">' + relatedLead.nombre + '</a></dd>' : ''}
              <dt>Fecha</dt><dd>${crm.formatDate(act.fecha)}</dd>
              <dt>Asesor</dt><dd>${act.asesor}</dd>
              <dt>Tipo</dt><dd>${tipoLabel}</dd>
            </dl>
          </div>
        </div>

        ${act.notas ? `<div class="card">
          <div class="card__header"><div class="card__title">Notas</div></div>
          <div class="card__body"><p style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin: 0;">${act.notas}</p></div>
        </div>` : ''}

        <div style="display: flex; gap: 10px;">
          <a href="07-actividades.html" style="text-decoration: none; flex: 1;">
            <button class="btn btn--secondary btn--block">${Icons.arrowLeft} Volver</button>
          </a>
          <button class="btn btn--primary btn--block">${Icons.check} Completar</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('actividades', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ breadcrumb: ['Actividades', act.id] }) +
      html +
    '</div>';
};
</script>
</body>
</html>
