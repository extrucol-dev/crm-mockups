<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Cliente Detalle</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

window.onCRMDataLoaded = function(crm) {
  const params = new URLSearchParams(window.location.search);
  const empresaId = params.get('id') || 'EMP-009';
  const empresa = crm.data.empresas.find(e => e.id === empresaId) || crm.data.empresas[0];
  const leads = crm.data.leads.filter(l => l.empresa === empresa.nombre);
  const opps = crm.data.oportunidades.filter(o => o.empresa === empresa.nombre);

  function clienteCardFromData(c) {
    const tipoBadge = c.nuevo ? 'info' : 'ganada';
    return `<a href="14-cliente-detalle.html?id=${c.id}" style="text-decoration: none; color: inherit;">
      <div class="cliente-card">
        <div class="cliente-card__header">
          <div class="avatar avatar--color-1">${c.nombre.substring(0,2).toUpperCase()}</div>
          <div style="flex:1; min-width: 0;">
            <div class="cliente-card__name">${c.nombre}</div>
            <div class="cliente-card__company">${c.sector}</div>
          </div>
          <span class="badge badge--${tipoBadge}">${c.sector}</span>
        </div>
        <div class="cliente-card__info">
          <div class="cliente-card__info-row">${Icons.mapPin}<span>${c.ciudad}, ${c.departamento}</span></div>
          <div class="cliente-card__info-row">${Icons.phone}<span>${c.nit}</span></div>
        </div>
        <div class="cliente-card__footer">
          <span>${Icons.calendar} ${c.leads_count || 0} leads · ${c.opps_count || 0} opps</span>
          ${Icons.chevronRight}
        </div>
      </div>
    </a>`;
  }

  const tipoLabel = empresa.nuevo ? 'Nuevo' : 'Activo';
  const tipoBadgeClass = empresa.nuevo ? 'info' : 'ganada';

  const contactosMap = {};
  leads.forEach(l => { if (!contactosMap[l.nombre]) contactosMap[l.nombre] = { nombre: l.nombre, email: l.email, telefono: l.telefono }; });
  const contactos = Object.values(contactosMap);

  const contactosHTML = contactos.length > 0 ? `<div style="display: flex; flex-direction: column; gap: 12px;">
    ${contactos.map((c, i) => `<div style="display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: var(--page-bg); border-radius: 8px;">
      <div class="avatar avatar--color-${(i % 6) + 1}">${String(c.nombre || '').substring(0, 2).toUpperCase()}</div>
      <div style="flex:1; min-width: 0;">
        <div style="font-weight:600; color: var(--text-primary); font-size: 13.5px;">${c.nombre}</div>
        <div style="font-size: 12px; color: var(--text-muted);">${empresa.nombre}</div>
        ${c.telefono ? `<div style="margin-top:4px;"><a style="color: var(--primary); font-size: 12px;">${Icons.phone.replace('icon"','icon icon--xs"')} ${c.telefono}</a></div>` : ''}
        ${c.email ? `<div><a style="color: var(--primary); font-size: 12px;">${Icons.envelope.replace('icon"','icon icon--xs"')} ${c.email}</a></div>` : ''}
      </div>
      <button class="topbar__icon-btn">${Icons.dots}</button>
    </div>`).join('')}
    <button class="btn btn--secondary btn--block" style="border-style: dashed;">${Icons.plus} Agregar contacto</button>
  </div>` : '<div style="padding:24px;text-align:center;color:var(--text-muted);">Sin contactos registrados</div>';

  const oppsHTML = opps.length > 0 ? `<div class="table-wrapper"><table class="table"><thead><tr><th>Oportunidad</th><th>Estado</th><th>Valor</th><th>Cierre</th><th></th></tr></thead><tbody>
    ${opps.map(o => {
      const badgeClass = o.estado === 'Cerrada Ganada' ? 'ganada' : o.estado === 'Cerrada Perdida' ? 'perdida' : 'propuesta';
      return `<tr>
        <td><div style="font-weight: 600; color: var(--text-primary);">${o.nombre}</div><div style="font-size: 11.5px; color: var(--text-muted);">${o.id}</div></td>
        <td><span class="badge badge--${badgeClass}"><span class="dot"></span> ${o.estado}</span></td>
        <td style="font-weight: 600;">${crm.formatCurrency(o.valor).replace('COP', '').trim()}</td>
        <td>${crm.formatDate(o.fecha_cierre)}</td>
        <td><a href="04-oportunidad-detalle.html?id=${o.id}" style="text-decoration: none;"><button class="table__action">${Icons.chevronRight}</button></a></td>
      </tr>`;
    }).join('')}
  </tbody></table></div>` : '<div style="padding:24px;text-align:center;color:var(--text-muted);">Sin oportunidades</div>';

  const leadsHTML = leads.length > 0 ? `<div class="table-wrapper"><table class="table"><thead><tr><th>Lead</th><th>Estado</th><th>Score</th><th>Origen</th><th></th></tr></thead><tbody>
    ${leads.map(l => {
      const badgeClass = l.estado === 'No Interesado' ? 'perdida' : l.estado === 'Interesado' ? 'calificacion' : l.estado === 'Contactado' ? 'propuesta' : 'prospecto';
      return `<tr>
        <td><div style="font-weight: 600; color: var(--text-primary);">${l.nombre}</div><div style="font-size: 11.5px; color: var(--text-muted);">${l.id}</div></td>
        <td><span class="badge badge--${badgeClass}"><span class="dot"></span> ${l.estado}</span></td>
        <td style="font-weight: 600;">${l.score}</td>
        <td>${l.origen}</td>
        <td><a href="10-lead-detalle.html?id=${l.id}" style="text-decoration: none;"><button class="table__action">${Icons.chevronRight}</button></a></td>
      </tr>`;
    }).join('')}
  </tbody></table></div>` : '<div style="padding:24px;text-align:center;color:var(--text-muted);">Sin leads asociados</div>';

  const headerHTML = `<div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px;">
    <div style="display: flex; align-items: flex-start; gap: 16px;">
      <div class="avatar avatar--lg avatar--color-1" style="width: 64px; height: 64px; font-size: 20px;">${empresa.nombre.substring(0, 2).toUpperCase()}</div>
      <div style="flex: 1;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;">
          <span class="badge badge--${tipoBadgeClass}"><span class="dot"></span> ${empresa.nuevo ? 'Cliente nuevo' : 'Cliente activo'}</span>
          <span class="badge badge--${tipoBadgeClass}">${tipoLabel}</span>
        </div>
        <div style="font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1.2;">${empresa.nombre}</div>
        <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">NIT ${empresa.nit}</div>
        <div style="display: flex; gap: 16px; margin-top: 12px; font-size: 13px; color: var(--text-secondary); flex-wrap: wrap;">
          <span style="display: inline-flex; align-items: center; gap: 6px;">${Icons.mapPin} ${empresa.ciudad}, ${empresa.departamento}</span>
        </div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn--secondary btn--sm">${Icons.pencil} Editar</button>
        <a href="05-oportunidad-form.html" style="text-decoration: none;">
          <button class="btn btn--primary btn--sm">${Icons.plus} Nueva oportunidad</button>
        </a>
      </div>
    </div>
  </div>`;

  const tabsHTML = `<div class="tabs">
    <a class="tab is-active" style="flex-shrink: 0;">Informacion</a>
    <a class="tab" style="flex-shrink: 0;">Contactos <span class="tab__count">${contactos.length}</span></a>
    <a class="tab" style="flex-shrink: 0;">Oportunidades <span class="tab__count">${opps.length}</span></a>
    <a class="tab" style="flex-shrink: 0;">Leads <span class="tab__count">${leads.length}</span></a>
  </div>`;

  const html = `<div class="content">
    ${headerHTML}
    ${tabsHTML}
    <div style="display: grid; gap: 16px; grid-template-columns: 1fr 1fr;">
      <div class="card">
        <div class="card__header"><div class="card__title">Contactos</div><button class="btn btn--ghost btn--sm">${Icons.plus}</button></div>
        <div class="card__body">${contactosHTML}</div>
      </div>
      <div class="card">
        <div class="card__header"><div class="card__title">Oportunidades</div><span class="badge badge--info">${opps.length} totales</span></div>
        ${oppsHTML}
      </div>
    </div>
    <div class="card" style="margin-top: 16px;">
      <div class="card__header"><div class="card__title">Leads asociados</div></div>
      <div class="card__body" style="padding:0;">${leadsHTML}</div>
    </div>
    <div class="card" style="margin-top: 16px;">
      <div class="card__header"><div><div class="card__title">Informacion general</div></div><button class="btn btn--ghost btn--sm">${Icons.pencil} Editar</button></div>
      <div class="card__body">
        <dl class="detail-info-list" style="grid-template-columns: 160px 1fr;">
          <dt>Tipo de documento</dt><dd>NIT</dd>
          <dt>Numero documento</dt><dd>${empresa.nit}</dd>
          <dt>Pais</dt><dd>Colombia</dd>
          <dt>Departamento</dt><dd>${empresa.departamento}</dd>
          <dt>Municipio</dt><dd>${empresa.ciudad}</dd>
          <dt>Sector economico</dt><dd>${empresa.sector}</dd>
          <dt>Estado</dt><dd><span class="badge badge--${tipoBadgeClass}"><span class="dot"></span> ${empresa.nuevo ? 'Cliente nuevo' : 'Cliente activo'}</span></dd>
        </dl>
      </div>
    </div>
  </div>`;

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('clientes', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ breadcrumb: ['Clientes', empresa.nombre] }) +
      html +
    '</div>';
};
</script>
</body>
</html>
