<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Mis Metas</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.goal-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: #fff;
  border-radius: 16px;
  padding: 32px;
  position: relative;
  overflow: hidden;
}
.goal-hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(243, 150, 16, 0.25) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.hero-ring {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) 0 72%, rgba(255,255,255,0.15) 72%);
  position: relative;
  flex-shrink: 0;
}
.hero-ring::before {
  content: ''; position: absolute; inset: 10px;
  background: var(--primary-dark);
  border-radius: 50%;
}
.hero-ring__inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1;
}
.hero-ring__value { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; }
.hero-ring__label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

.meta-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all 180ms;
  position: relative;
  overflow: hidden;
}
.meta-card:hover { box-shadow: var(--shadow-md); }
.meta-card__stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.meta-card__header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.meta-card__icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.meta-card__title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.meta-card__desc { font-size: 11.5px; color: var(--text-muted); }
.meta-card__progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.meta-current { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.meta-target { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.meta-pct { font-size: 13px; font-weight: 700; }
.meta-bar { height: 8px; background: var(--page-bg); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
.meta-bar__fill { height: 100%; border-radius: 4px; transition: width 400ms ease; }

.week-chart {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 4px;
  padding: 16px 0;
}
.week-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.week-bar { width: 100%; background: var(--page-bg); border-radius: 3px; position: relative; height: 80px; overflow: hidden; }
.week-bar__fill { position: absolute; bottom: 0; left: 0; right: 0; background: var(--primary); border-radius: 3px; }
.week-bar__target { position: absolute; left: 0; right: 0; border-top: 2px dashed var(--accent); }
.week-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }

.achievement-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
}
.achievement-card__icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.achievement-card--unlocked { background: #FFF9EC; border-color: #F5D98C; }
.achievement-card--locked { opacity: 0.55; }
</style>
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

window.onCRMDataLoaded = function(crm) {
  const misOpp = crm.getOportunidades({ asesor: currentUser });
  const misLeads = crm.getLeads({ asesor: currentUser });
  const misAct = crm.getActividades({ asesor: currentUser });
  const ventas = misOpp.filter(o => o.estado === 'Cerrada Ganada').reduce((s, o) => s + (o.valor || 0), 0);
  const metaVentas = 350000000;
  const pctVentas = Math.min(Math.round((ventas / metaVentas) * 100), 100);
  const leadsAtendidos = misLeads.filter(l => l.estado !== 'Nuevo').length;
  const metaLeads = 15;
  const pctLeads = Math.min(Math.round((misLeads.length / metaLeads) * 100), 100);
  const actsMeta = 20;
  const pctActs = Math.min(Math.round((misAct.length / actsMeta) * 100), 100);
  const activas = misOpp.filter(o => !['Cerrada Ganada', 'Cerrada Perdida'].includes(o.estado)).length;

  const html = `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis metas</div>
          <div class="page-head__subtitle">${new Date().toLocaleDateString('es-CO', { month: 'long', year: 'numeric' })} · Seguimiento de metas comerciales</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--primary btn--sm">${Icons.pencil} Editar metas</button>
        </div>
      </div>

      <div class="goal-hero" style="margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 32px; position: relative;">
          <div class="hero-ring">
            <div class="hero-ring__inner">
              <div class="hero-ring__value">${pctVentas}%</div>
              <div class="hero-ring__label">Completado</div>
            </div>
          </div>
          <div style="flex: 1;">
            <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; margin-bottom: 6px;">Progreso global del mes</div>
            <div style="font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px;">
              Buen ritmo, ${currentUser}! <span style="color: var(--accent);">Vas en buen camino</span>
            </div>
            <div style="font-size: 15px; opacity: 0.85; max-width: 560px; line-height: 1.5;">
              Has completado el ${pctVentas}% de tus metas consolidadas. ${activas} oportunidades activas en pipeline.
            </div>
            <div style="display: flex; gap: 12px; margin-top: 16px;">
              <div style="padding: 10px 16px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; flex-direction: column;">
                <span style="font-size: 11px; opacity: 0.7; text-transform: uppercase; font-weight: 600;">Leads</span>
                <span style="font-size: 18px; font-weight: 800;">${misLeads.length}</span>
              </div>
              <div style="padding: 10px 16px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; flex-direction: column;">
                <span style="font-size: 11px; opacity: 0.7; text-transform: uppercase; font-weight: 600;">Oportunidades</span>
                <span style="font-size: 18px; font-weight: 800;">${misOpp.length}</span>
              </div>
              <div style="padding: 10px 16px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; flex-direction: column;">
                <span style="font-size: 11px; opacity: 0.7; text-transform: uppercase; font-weight: 600;">Proyeccion mes</span>
                <span style="font-size: 18px; font-weight: 800;">${crm.formatCurrency(ventas).replace('COP','').trim()}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px;">
        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--success);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: #E8F5EE; color: var(--success);">${Icons.currency}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>
          <div class="meta-card__title">Ventas del mes</div>
          <div class="meta-card__desc">Oportunidades ganadas · Valor total cerrado</div>
          <div style="margin-top: 14px;">
            <div class="meta-card__progress-row">
              <div>
                <span class="meta-current" style="color: var(--success);">${crm.formatCurrency(ventas).replace('COP','').trim()}</span>
                <span class="meta-target">/ ${crm.formatCurrency(metaVentas).replace('COP','').trim()}</span>
              </div>
              <span class="meta-pct" style="color: var(--success);">${pctVentas}%</span>
            </div>
            <div class="meta-bar">
              <div class="meta-bar__fill" style="width: ${pctVentas}%; background: var(--success);"></div>
            </div>
            <div style="font-size: 11.5px; color: var(--text-muted);">
              ${misOpp.filter(o => o.estado === 'Cerrada Ganada').length} opp ganadas
            </div>
          </div>
        </div>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--primary);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: var(--primary-bg); color: var(--primary);">${Icons.briefcase}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>
          <div class="meta-card__title">Oportunidades abiertas</div>
          <div class="meta-card__desc">Cantidad minima activa en pipeline</div>
          <div style="margin-top: 14px;">
            <div class="meta-card__progress-row">
              <div>
                <span class="meta-current" style="color: var(--primary);">${activas}</span>
                <span class="meta-target">/ 10 opp.</span>
              </div>
              <span class="meta-pct" style="color: ${activas >= 10 ? 'var(--success)' : 'var(--accent)'};">${Math.round(activas/10*100)}%</span>
            </div>
            <div class="meta-bar">
              <div class="meta-bar__fill" style="width: ${Math.min(activas/10*100, 100)}%; background: var(--primary);"></div>
            </div>
            <div style="font-size: 11.5px; color: var(--text-muted);">
              ${activas} oportunidades activas
            </div>
          </div>
        </div>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--accent);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: var(--accent-bg); color: var(--accent);">${Icons.clipboardCheck}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>
          <div class="meta-card__title">Actividades mensuales</div>
          <div class="meta-card__desc">Visitas, llamadas, reuniones registradas</div>
          <div style="margin-top: 14px;">
            <div class="meta-card__progress-row">
              <div>
                <span class="meta-current" style="color: var(--accent);">${misAct.length}</span>
                <span class="meta-target">/ ${actsMeta} este mes</span>
              </div>
              <span class="meta-pct" style="color: var(--accent);">${pctActs}%</span>
            </div>
            <div class="meta-bar">
              <div class="meta-bar__fill" style="width: ${pctActs}%; background: var(--accent);"></div>
            </div>
            <div style="font-size: 11.5px; color: var(--text-muted);">
              ${misAct.length} actividades registradas
            </div>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 16px;">
        <div class="card">
          <div class="card__header">
            <div>
              <div class="card__title">Progreso semanal de ventas</div>
              <div class="card__subtitle">Ventas cerradas por semana · Linea punteada: meta semanal</div>
            </div>
          </div>
          <div class="card__body">
            <div class="week-chart">
              ${[{w:'S1',v:60},{w:'S2',v:80},{w:'S3',v:70},{w:'S4',v:90},{w:'S5',v:85},{w:'S6',v:95},{w:'S7',v:100},{w:'S8',v:88},{w:'S9',v:82},{w:'S10',v:75},{w:'S11',v:65},{w:'S12',v:45,current:true}].map(w => `
                <div class="week-col">
                  <div class="week-bar" style="${w.current ? 'box-shadow: 0 0 0 2px var(--accent);' : ''}">
                    <div class="week-bar__target" style="bottom: 65%;"></div>
                    <div class="week-bar__fill" style="height: ${w.v}%;"></div>
                  </div>
                  <span class="week-label" style="${w.current ? 'color: var(--accent); font-weight: 700;' : ''}">${w.w}</span>
                </div>`).join('')}
            </div>
            <div style="display: flex; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 8px;">
              <div>
                <div style="font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Promedio semanal</div>
                <div style="font-size: 17px; font-weight: 800; color: var(--text-primary);">$ 58 M</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Mejor semana</div>
                <div style="font-size: 17px; font-weight: 800; color: var(--success);">$ 75 M <span style="font-size: 11px;">(S7)</span></div>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Semana actual</div>
                <div style="font-size: 17px; font-weight: 800; color: var(--accent);">$ 34 M <span style="font-size: 11px;">(parcial)</span></div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card__header">
            <div>
              <div class="card__title">Acciones recomendadas</div>
              <div class="card__subtitle">Basado en tu progreso actual</div>
            </div>
          </div>
          <div class="card__body">
            ${[
              {priority:'Alta',action:'Cerrar oportunidad EMPAS ($485 M)',detail:'Tienes 60% de probabilidad y vence en 5 dias',icon:'fire',iconColor:'var(--error)',bg:'#FDECEA'},
              {priority:'Alta',action:'Agendar 5 visitas sector Agro',detail:'Meta personal atrasada',icon:'mapPin',iconColor:'var(--accent)',bg:'#FFF4E0'},
              {priority:'Media',action:'Contactar lead Agroindustria',detail:'Score 65/100 · Sin contacto hace 2 dias',icon:'phone',iconColor:'var(--primary)',bg:'var(--primary-bg)'},
            ].map(a => `
              <div style="display: flex; align-items: flex-start; gap: 12px; padding: 10px; background: ${a.bg}; border-radius: 6px; margin-bottom: 8px;">
                <div style="width: 32px; height: 32px; border-radius: 6px; background: #fff; color: ${a.iconColor}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  ${Icons[a.icon]}
                </div>
                <div style="flex: 1;">
                  <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
                    <span style="font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 1px 6px; background: ${a.iconColor}; color: #fff; border-radius: 8px;">${a.priority}</span>
                    <strong style="font-size: 12.5px; color: var(--text-primary);">${a.action}</strong>
                  </div>
                  <div style="font-size: 11.5px; color: var(--text-secondary); line-height: 1.4;">${a.detail}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('metas', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ title: 'Mis metas' }) +
      html +
    '</div>';
};
</script>
</body>
</html>
