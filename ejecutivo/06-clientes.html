<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Clientes</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

window.onCRMDataLoaded = function(crm) {
  const empresas = crm.getEmpresas ? crm.getEmpresas() : (crm.data?.empresas || []);

  function clienteCardFromData(c) {
    const tipoBadge = c.nuevo ? 'info' : 'ganada';
    const tipoLabel = c.nuevo ? 'Nuevo' : 'Recurrente';
    return `
    <a href="14-cliente-detalle.html?id=${c.id}" style="text-decoration: none; color: inherit;">
      <div class="cliente-card">
        <div class="cliente-card__header">
          <div class="avatar avatar--color-1">${c.nombre.substring(0,2).toUpperCase()}</div>
          <div style="flex:1; min-width: 0;">
            <div class="cliente-card__name">${c.nombre}</div>
            <div class="cliente-card__company">${c.sector}</div>
          </div>
          <span class="badge badge--${tipoBadge}">${c.sector}</span>
        </div>
        <div class="cliente-card__info">
          <div class="cliente-card__info-row">${Icons.mapPin}<span>${c.ciudad}, ${c.departamento}</span></div>
          <div class="cliente-card__info-row">${Icons.phone}<span>${c.nit}</span></div>
        </div>
        <div class="cliente-card__footer">
          <span>${Icons.calendar} ${c.leads_count || 0} leads · ${c.opps_count || 0} opps</span>
          <div style="display:flex; align-items:center; gap: 6px;">
            <span class="badge badge--${tipoBadge}" style="font-size: 10px;">${tipoLabel}</span>
            ${Icons.chevronRight}
          </div>
        </div>
      </div>
    </a>`;
  }

  const recurrentes = empresas.filter(e => !e.nuevo).length;

  const html = `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis Clientes</div>
          <div class="page-head__subtitle">${empresas.length} empresas en tu cartera · ${recurrentes} clientes recurrentes</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
          <button class="btn btn--primary btn--sm">${Icons.plus} Nuevo cliente</button>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 340px;">
          ${Icons.search}
          <input class="input input--with-icon" placeholder="Buscar empresa, NIT, contacto...">
        </div>
        <select class="select" style="max-width: 180px;">
          <option>Todos los sectores</option>
          <option>AGUA</option>
          <option>GAS</option>
          <option>INDUSTRIA</option>
          <option>CONSTRUCCION</option>
        </select>
        <select class="select" style="max-width: 180px;">
          <option>Todas las ciudades</option>
          ${[...new Set(empresas.map(e => e.ciudad))].filter(Boolean).map(c => `<option>${c}</option>`).join('')}
        </select>
        <button class="btn btn--secondary btn--sm" style="margin-left:auto;">${Icons.filter} Mas filtros</button>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
        ${empresas.map(clienteCardFromData).join('')}
      </div>
    </div>
  `;

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('clientes', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ title: 'Mis Clientes' }) +
      html +
    '</div>';
};
</script>
</body>
</html>
