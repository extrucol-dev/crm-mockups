<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Proyecto Detalle</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.detail-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
}
.detail-title {
  font-size: 22px; font-weight: 800; color: var(--text-primary);
  letter-spacing: -0.02em; line-height: 1.2;
}
.detail-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="app-shell" id="desktop-shell"></div>

<script src="../shared/components.js"></script>
<script src="../js/crm-data-loader.js"></script>
<script>
const currentUser = 'PAOLA';

window.onCRMDataLoaded = function(crm) {
  const proyecto = {
    id: 'PRY-2026-0012',
    nombre: 'Acueducto rural Piedecuesta Fase 1',
    empresa: 'EMPAS S.A.',
    estado: 'En ejecucion',
    badge: 'propuesta',
    progress: 45,
    inicio: '01 Mar 2026',
    fin: '30 Ago 2026',
    valor: '$ 485 M',
    valorNum: 485000000,
    sector: 'Agua Potable',
    oportunidadId: 'OPP-2025-0042',
    responsable: currentUser,
    duracion: '6 meses'
  };

  const headerHTML = `<div class="detail-header">
    <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
      <a href="08-proyectos.html" style="color: var(--primary); cursor: pointer;">Proyectos</a>
      <span>/</span>
      <span>${proyecto.id}</span>
    </div>
    <div style="display: flex; gap: 16px; align-items: flex-start;">
      <div style="flex:1;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;">
          <span class="badge badge--propuesta"><span class="dot"></span> ${proyecto.estado}</span>
          <span class="badge badge--info">${proyecto.sector}</span>
        </div>
        <div class="detail-title">${proyecto.nombre}</div>
        <div class="detail-subtitle">Generado desde oportunidad ${proyecto.oportunidadId} · ${proyecto.empresa}</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn--secondary btn--sm">${Icons.pencil} Editar</button>
        <button class="btn btn--primary btn--sm">${Icons.check} Marcar entregado</button>
      </div>
    </div>
  </div>`;

  const progressHTML = `<div class="card">
    <div class="card__header">
      <div class="card__title">Avance del proyecto</div>
      <span class="badge badge--propuesta">${proyecto.progress}% completado</span>
    </div>
    <div class="card__body">
      <div style="margin-bottom: 16px;">
        <div class="progress__bar" style="height: 10px;">
          <div class="progress__fill" style="width: ${proyecto.progress}%;"></div>
        </div>
      </div>
      <div class="timeline">
        <div class="timeline__item">
          <div class="timeline__dot timeline__dot--success"></div>
          <div class="timeline__header">
            <div class="timeline__title">Firma de contrato</div>
            <span class="timeline__date">01 Mar</span>
          </div>
          <div class="timeline__desc">Contrato firmado y legalizado</div>
        </div>
        <div class="timeline__item">
          <div class="timeline__dot timeline__dot--success"></div>
          <div class="timeline__header">
            <div class="timeline__title">Entrega de materiales fase 1</div>
            <span class="timeline__date">15 Mar</span>
          </div>
          <div class="timeline__desc">Tuberia y accesorios primera entrega</div>
        </div>
        <div class="timeline__item">
          <div class="timeline__dot"></div>
          <div class="timeline__header">
            <div class="timeline__title">Instalacion red principal</div>
            <span class="timeline__date">En curso</span>
          </div>
          <div class="timeline__desc">Obra en ejecucion por contratista</div>
        </div>
        <div class="timeline__item">
          <div class="timeline__dot timeline__dot--muted"></div>
          <div class="timeline__header">
            <div class="timeline__title">Pruebas de presion</div>
            <span class="timeline__date">15 Jun</span>
          </div>
          <div class="timeline__desc">Programada</div>
        </div>
        <div class="timeline__item">
          <div class="timeline__dot timeline__dot--muted"></div>
          <div class="timeline__header">
            <div class="timeline__title">Entrega final</div>
            <span class="timeline__date">30 Ago</span>
          </div>
          <div class="timeline__desc">Programada</div>
        </div>
      </div>
    </div>
  </div>`;

  const infoHTML = `<div class="card">
    <div class="card__header">
      <div class="card__title">Informacion</div>
      <button class="btn btn--ghost btn--sm">${Icons.pencil}</button>
    </div>
    <div class="card__body">
      <dl class="detail-info-list">
        <dt>Empresa</dt><dd>${proyecto.empresa}</dd>
        <dt>Sector</dt><dd>${proyecto.sector}</dd>
        <dt>Valor</dt><dd style="color: var(--accent); font-weight: 700;">${proyecto.valor}</dd>
        <dt>Fecha inicio</dt><dd>${proyecto.inicio}</dd>
        <dt>Fecha fin</dt><dd>${proyecto.fin}</dd>
        <dt>Duracion</dt><dd>${proyecto.duracion}</dd>
        <dt>Responsable</dt><dd>${proyecto.responsable}</dd>
        <dt>Oportunidad</dt><dd><a href="04-oportunidad-detalle.html?id=${proyecto.oportunidadId}" style="color: var(--primary); cursor: pointer;">${proyecto.oportunidadId}</a></dd>
      </dl>
    </div>
  </div>`;

  const html = `
    <div class="content">
      ${headerHTML}
      <div style="display: grid; gap: 16px; grid-template-columns: 1fr 320px;">
        ${progressHTML}
        ${infoHTML}
      </div>
    </div>
  `;

  document.getElementById('desktop-shell').innerHTML =
    renderSidebar('proyectos', 'ejecutivo') +
    '<div class="main-area">' +
      renderTopbar({ breadcrumb: ['Proyectos', proyecto.id] }) +
      html +
    '</div>';
};
</script>
</body>
</html>
